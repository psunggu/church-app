<script>
const P_ID='4133',P_LABEL='4133кө¬м—ӯ';

// в•җв•җв•җ кІҢмқҙнҠёмӣЁмқҙ URL (41көҗкө¬ нҶөн•© мӢңнҠёмқҳ Apps Script URL) в•җв•җв•җ
// мқҙ URLл§Ң HTMLм—җ л…ём¶ң вҖ” м ‘мҶҚмҪ”л“ң м—ҶмқҙлҠ” лҚ°мқҙн„° м ‘к·ј л¶Ҳк°Җ
const GATEWAY_URL='https://script.google.com/macros/s/https://script.google.com/macros/s/AKfycbwYD9w8MhK3ESbRmB0anY_dpL9i-3Sc8_UDn3Q35z2LdVIi8Krfs5z1FnGwWU9LdgpWrw/exec'; // вҶҗ 41көҗкө¬ Apps Script л°°нҸ¬ URLмқ„ л„Јм–ҙмЈјм„ёмҡ”

const FALLBACK_MEMBERS=[
  {n:'м„ұлҜём„ ',r:'кө¬м—ӯмһҘ'},{n:'л°•м„ұк·ң',r:'к¶Ңм°°'},{n:'кі мҡ”н•ң',r:'кө¬м—ӯмӣҗ'},{n:'к№Җм„ұмқҙB',r:'кө¬м—ӯмӣҗ'},
  {n:'к№Җм§„м„ C',r:'кө¬м—ӯмӣҗ'},{n:'л°•мў…лҜјA',r:'кө¬м—ӯмӣҗ'},{n:'лІ”н•ҳлӮҳ',r:'кө¬м—ӯмӣҗ'},{n:'мқҙмғҒк·ң',r:'кө¬м—ӯмӣҗ'},
  {n:'мқҙмҲҳмҳҒ',r:'кө¬м—ӯмӣҗ'},{n:'м •лҸҷм§„',r:'кө¬м—ӯмӣҗ'},{n:'м •нқ¬м§„B',r:'кө¬м—ӯмӣҗ'},{n:'м ңмҳҒнҳё',r:'кө¬м—ӯмӣҗ'},
  {n:'мЎ°м •м—°',r:'кө¬м—ӯмӣҗ'},{n:'м§ҖлӘ…нқ¬',r:'кө¬м—ӯмӣҗ'},{n:'мқҙмғҒмқёA',r:'кө¬м—ӯмӣҗ'},{n:'м•Ҳм„ұлҜј',r:'кө¬м—ӯмӣҗ'},
  {n:'мқҙмһ¬мҳҒA',r:'кө¬м—ӯмӣҗ'},{n:'мһҘм„ңм—°B',r:'кө¬м—ӯмӣҗ'}
];
const ITEMS=[
  {k:'at',l:'м¶ңм„қ',s:20,t:'c',g:0},{k:'br',l:'м„ұкІҪмқҪкё°',s:1,u:'мһҘ',t:'n',g:1},
  {k:'bw',l:'м„ұкІҪм“°кё°',s:5,u:'мӘҪ',t:'n',g:1},{k:'bt',l:'м„ұкІҪнғҖмқҙн•‘',s:2,u:'мӘҪ',t:'n',g:1},
  {k:'me',l:'м•”мҶЎ',s:3,t:'c',g:2},{k:'ev',l:'м „лҸ„',s:50,t:'c',g:2},
  {k:'ds',l:'кө¬м—ӯлҙүмӮ¬',s:100,t:'c',g:3},{k:'ss',l:'мЈјмқј/лҙүмӮ¬нҢҖ лҙүмӮ¬',s:30,t:'c',g:3},
  {k:'nu',l:'м–‘мңЎ',s:10,t:'c',g:2},{k:'mg',l:'м–‘нҷ”м§„/мҲңкөҗмһҗ м•ҲлӮҙ',s:20,t:'c',g:3},
  {k:'en',l:'нҷҳкІҪліҙнҳём җмҲҳ',s:100,t:'c',g:4},{k:'mp',l:'кө¬м—ӯлӘЁмһ„ мһҘмҶҢ',s:100,t:'c',g:4},
  {k:'wb',l:'кІЁмҡёл°©н•ҷ м„ұкІҪмқҪкё°',s:1,u:'мһҘ',t:'n',g:4},{k:'bm',l:'м„ұкІҪ нҶөлҸ…мҲҳл ЁнҡҢ',s:1189,t:'c',g:4}
];
const GROUPS=[{l:'рҹ“– м„ұкІҪ',g:1},{l:'рҹҷҸ мӢ м•ҷмғқнҷң',g:2},{l:'рҹӨқ лҙүмӮ¬',g:3},{l:'вӯҗ нҠ№лі„н•ӯлӘ©',g:4}];
const MAP_TO_SHEET={at:'attendance',br:'bible_read',bw:'bible_write',bt:'bible_typing',me:'memorize',ev:'evangelism',ds:'district_service',ss:'sunday_service',nu:'nurture',mg:'martyr_guide',en:'environment',mp:'meeting_place',wb:'winter_bible',bm:'bible_marathon'};
const MAP_FROM_SHEET={};Object.entries(MAP_TO_SHEET).forEach(([k,v])=>MAP_FROM_SHEET[v]=k);

let sundays=[];
(function(){const now=new Date();for(let i=-6;i<=4;i++){const d=new Date(now);const day=d.getDay();d.setDate(d.getDate()-day+(day===0?0:7)+i*7);d.setHours(0,0,0,0);const m=d.getMonth()+1,dt=d.getDate();sundays.push({k:`${d.getFullYear()}-${String(m).padStart(2,'0')}-${String(dt).padStart(2,'0')}`,l:`${m}/${dt}`,ts:d.getTime()});}})();

// в•җв•җв•җ мғҒнғң в•җв•җв•җ
let state={url:'',week:'',data:{},members:[],expanded:null,view:'list',ready:false,loading:false,addingMember:false,dataSource:'',savedWeeks:{},lastModified:null,unsaved:false,touched:new Set(),gatewayUrl:''};
state.week=(function(){let c=sundays[0],now=Date.now();for(const s of sundays)if(Math.abs(s.ts-now)<Math.abs(c.ts-now))c=s;return c.k;})();

function empty(){const d={};ITEMS.forEach(i=>d[i.k]=i.t==='c'?false:'');return d;}
function emptyAll(){const o={};state.members.forEach(m=>o[m.n]=empty());return o;}
function score(d){if(!d)return 0;let t=0;ITEMS.forEach(i=>{if(i.t==='c'&&d[i.k])t+=i.s;else if(i.t==='n')t+=(parseInt(d[i.k])||0)*i.s;});return t;}
function filled(d){if(!d)return 0;let c=0;ITEMS.forEach(i=>{if(i.t==='c'&&d[i.k])c++;else if(i.t==='n'&&parseInt(d[i.k])>0)c++;});return c;}
function hasFilled(d){return filled(d)>0;}
function hasAnyData(d){return state.members.some(m=>hasFilled(d[m.n]));}

// в•җв•җв•җ мҠӨнҶ лҰ¬м§Җ (Claude м•„нӢ°нҢ©нҠё + мқјл°ҳ лёҢлқјмҡ°м Җ нҳёнҷҳ) в•җв•җв•җ
const SK=w=>`ch4133:${w}`,UK='ch4133:url',MK='ch4133:members',WK='ch4133:savedWeeks';
const HAS_CLOUD=typeof window.storage!=='undefined'&&window.storage&&typeof window.storage.get==='function';

async function sget(k){
  // 1. window.storage (Claude м•„нӢ°нҢ©нҠё)
  if(HAS_CLOUD){
    try{const r=await window.storage.get(k);if(r&&r.value!==undefined&&r.value!==null)return r.value;return null;}catch{}
  }
  // 2. localStorage (мқјл°ҳ лёҢлқјмҡ°м Җ/н•ёл“ңнҸ°)
  try{return localStorage.getItem(k);}catch{return null;}
}
async function sset(k,v){
  let ok=false;
  if(HAS_CLOUD){
    try{const r=await window.storage.set(k,v);ok=!!r;}catch{}
  }
  try{localStorage.setItem(k,v);ok=true;}catch{}
  return ok;
}
async function sdel(k){
  if(HAS_CLOUD){try{await window.storage.delete(k);}catch{}}
  try{localStorage.removeItem(k);}catch{}
}

// в•җв•җв•җ м ҖмһҘлҗң мЈјм°Ё кҙҖлҰ¬ в•җв•җв•җ
async function markWeekSaved(weekKey){
  state.savedWeeks[weekKey]=true;
  await sset(WK,JSON.stringify(state.savedWeeks));
}
async function loadSavedWeeks(){
  const raw=await sget(WK);
  if(raw)state.savedWeeks=JSON.parse(raw);
}

// в•җв•җв•җ лҚ°мқҙн„° м ҖмһҘ (л§Ө ліҖкІҪл§ҲлӢӨ лЎңм»¬м—җ м ҖмһҘ) в•җв•җв•җ
async function saveData(){
  state.lastModified=new Date();
  state.unsaved=true;
  const json=JSON.stringify(state.data);
  const ok=await sset(SK(state.week),json);
  if(ok&&hasAnyData(state.data))await markWeekSaved(state.week);
  // мөңмў…мҲҳм • мӢңк°„ UI м—…лҚ°мқҙнҠё
  const el=document.getElementById('last-mod');
  if(el){
    const t=state.lastModified;
    el.textContent='мөңмў…мҲҳм • '+t.getHours()+':'+String(t.getMinutes()).padStart(2,'0')+':'+String(t.getSeconds()).padStart(2,'0');
    el.style.display='inline';
  }
  const uel=document.getElementById('unsaved-badge');
  if(uel)uel.style.display='inline';
}

// в•җв•җв•җ кө¬м—ӯмӣҗ л¶Ҳлҹ¬мҳӨкё° в•җв•җв•җ
async function loadMembers(){
  if(state.url){
    try{
      const res=await fetch(state.url+'?action=members&parish='+P_ID,{redirect:'follow'});
      const text=await res.text();
      if(!text.startsWith('<')){
        const json=JSON.parse(text);
        if(json.members&&json.members.length>0){
          state.members=json.members.map(m=>({n:m.name,r:m.role}));
          await sset(MK,JSON.stringify(state.members));return;
        }
      }
    }catch(e){}
  }
  const cached=await sget(MK);
  if(cached){state.members=JSON.parse(cached);return;}
  state.members=[...FALLBACK_MEMBERS];
}

// в•җв•җв•җ мЈјк°„ лҚ°мқҙн„° л¶Ҳлҹ¬мҳӨкё° (кө¬кёҖмӢңнҠё DATA нғӯ мөңмҡ°м„ ) в•җв•җв•җ
async function loadWeek(){
  state.loading=true;state.dataSource='';render();

  if(state.url){
    // в”Җв”Җв”Җ мӢңнҠё мЎ°нҡҢ (мөңлҢҖ 2нҡҢ мӢңлҸ„) в”Җв”Җв”Җ
    let result=null;
    for(let attempt=0;attempt<2;attempt++){
      result=await fetchFromSheet(state.week);
      if(result.connected)break;
      // 1нҡҢ мӢӨнҢЁ мӢң 0.5мҙҲ лҢҖкё° нӣ„ мһ¬мӢңлҸ„
      if(attempt===0)await new Promise(r=>setTimeout(r,500));
    }

    if(result&&result.connected){
      if(result.data){
        state.data=result.data;
        state.dataSource='sheet';
        await sset(SK(state.week),JSON.stringify(state.data));
        await markWeekSaved(state.week);
      }else{
        state.data=emptyAll();
        state.dataSource='empty';
        await sset(SK(state.week),'');
      }
      state.loading=false;
      render();
      return;
    }

    // мӢңнҠё м—°кІ° мӢӨнҢЁ лЎңк·ё
    state._sheetError=result?result.error:'unknown';
    console.log('Sheet connection failed:',state._sheetError);
  }

  // в”Җв”Җв”Җ мӢңнҠё м—°кІ° мӢӨнҢЁ вҶ’ лЎңм»¬ мәҗмӢң (мҳӨн”„лқјмқё л°ұм—…) в”Җв”Җв”Җ
  try{
    const raw=await sget(SK(state.week));
    if(raw&&raw.length>10){
      const localData=JSON.parse(raw);
      state.data={...emptyAll(),...localData};
      Object.keys(localData).forEach(k=>{if(!state.data[k])state.data[k]=localData[k];});
      state.dataSource='local';
      state.loading=false;
      render();
      return;
    }
  }catch(e){}

  state.data=emptyAll();
  state.dataSource='empty';
  state.loading=false;
  render();
}

// в•җв•җв•җ мӢңнҠём—җм„ң лҚ°мқҙн„° к°Җм ёмҳӨкё° (нғҖмһ„м•„мӣғ + м—җлҹ¬ мІҳлҰ¬ к°•нҷ”) в•җв•җв•җ
async function fetchFromSheet(weekKey){
  if(!state.url)return {connected:false,data:null,error:'URLм—ҶмқҢ'};
  try{
    const url=state.url+'?action=read&date='+encodeURIComponent(weekKey)+'&parish='+P_ID;

    // 10мҙҲ нғҖмһ„м•„мӣғ
    const controller=new AbortController();
    const timeout=setTimeout(()=>controller.abort(),10000);

    const res=await fetch(url,{
      redirect:'follow',
      signal:controller.signal
    });
    clearTimeout(timeout);

    const text=await res.text();

    // HTML мқ‘лӢө = Apps Script мқёмҰқ/л°°нҸ¬ л¬ём ң
    if(text.startsWith('<')||text.startsWith('!')){
      return {connected:false,data:null,error:'HTMLмқ‘лӢө(мһ¬л°°нҸ¬н•„мҡ”)'};
    }

    // л№Ҳ мқ‘лӢө
    if(!text||text.trim().length===0){
      return {connected:false,data:null,error:'л№Ҳмқ‘лӢө'};
    }

    const json=JSON.parse(text);

    // rows н•„л“ң мЎҙмһ¬ нҷ•мқё (м •мғҒ мқ‘лӢө)
    if(!json.hasOwnProperty('rows')){
      return {connected:false,data:null,error:'rowsн•„л“ңм—ҶмқҢ:'+text.substring(0,100)};
    }

    // лҚ°мқҙн„° мһҲмқҢ
    if(json.rows.length>0){
      const loaded=emptyAll();
      json.rows.forEach(r=>{
        const name=r.member_name;
        if(!loaded[name])loaded[name]=empty();
        Object.entries(MAP_FROM_SHEET).forEach(([sheetKey,appKey])=>{
          const item=ITEMS.find(i=>i.k===appKey);if(!item)return;
          const val=r[sheetKey];
          if(item.t==='c')loaded[name][appKey]=(val==='O'||val===true);
          else if(item.t==='n')loaded[name][appKey]=val?String(val):'';
        });
      });
      return {connected:true,data:loaded,error:null};
    }

    // м—°кІ° м„ұкіө, лҚ°мқҙн„° 0кұҙ
    return {connected:true,data:null,error:null};

  }catch(e){
    return {connected:false,data:null,error:e.name==='AbortError'?'нғҖмһ„м•„мӣғ(10мҙҲ)':e.message};
  }
}

// в•җв•җв•җ мӢңнҠём—җм„ң к°•м ң мғҲлЎңкі м№Ё в•җв•җв•җ
async function forceLoadFromSheet(){
  if(!state.url){toast('мӢңнҠё м—°лҸҷмқҙ н•„мҡ”н•©лӢҲлӢӨ');return;}
  state.loading=true;render();
  const result=await fetchFromSheet(state.week);
  if(result.connected){
    if(result.data){
      state.data=result.data;
      state.dataSource='sheet';
      await sset(SK(state.week),JSON.stringify(state.data));
      await markWeekSaved(state.week);
      toast('мӢңнҠём—җм„ң л¶Ҳлҹ¬мҷ”мҠөлӢҲлӢӨ');
    }else{
      state.data=emptyAll();
      state.dataSource='empty';
      await sset(SK(state.week),'');
      toast('мӢңнҠём—җ н•ҙлӢ№ мЈј лҚ°мқҙн„°к°Җ м—ҶмҠөлӢҲлӢӨ');
    }
  }else{toast('мӢңнҠё м—°кІ° мӢӨнҢЁ');}
  state.loading=false;render();
}

async function addMember(){
  const nameEl=document.getElementById('add-name'),roleEl=document.getElementById('add-role');
  if(!nameEl)return;const name=nameEl.value.trim(),role=roleEl?roleEl.value:'кө¬м—ӯмӣҗ';
  if(!name){toast('мқҙлҰ„мқ„ мһ…л Ҙн•ҙмЈјм„ёмҡ”');return;}
  if(state.members.some(m=>m.n===name)){toast('мқҙлҜё л“ұлЎқлҗң мқҙлҰ„мһ…лӢҲлӢӨ');return;}
  if(state.url){try{await fetch(state.url,{method:'POST',redirect:'follow',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action:'addMember',name,role,parish_id:P_ID})});}catch{}}
  state.members.push({n:name,r:role});state.data[name]=empty();
  await sset(MK,JSON.stringify(state.members));
  state.addingMember=false;toast(name+' м¶”к°Җ мҷ„лЈҢ');render();
}

function numAdj(name,k,delta){if(!state.data[name])state.data[name]=empty();const v=Math.max(0,(parseInt(state.data[name][k])||0)+delta);state.data[name][k]=String(v);state.touched.add(name);saveData();const el=document.getElementById('ni-'+CSS.escape(name)+'-'+k);if(el)el.value=v;updateMemberInfo(name);updateSummary();}

async function syncSheet(){
  if(!state.url)return toast('URLмқҙ м—ҶмҠөлӢҲлӢӨ');
  const btn=document.getElementById('sync-btn');
  if(btn){btn.disabled=true;btn.textContent='м ҖмһҘ мӨ‘...';}
  const d=state.data;

  const targets=state.members.filter(m=>state.touched.has(m.n)||hasFilled(d[m.n]));
  const rows=targets.map(m=>{
    const md=d[m.n]||empty();
    const r={report_date:state.week,parish_id:P_ID,member_name:m.n,role:m.r,total_score:score(md),recorded_by:'лӘЁл°”мқјм•ұ'};
    ITEMS.forEach(it=>{const key=MAP_TO_SHEET[it.k];if(it.t==='c')r[key]=md[it.k]?'O':'X';else if(it.t==='n')r[key]=parseInt(md[it.k])||0;});
    return r;
  });
  if(rows.length===0){toast('мһ…л Ҙлҗң лҚ°мқҙн„°к°Җ м—ҶмҠөлӢҲлӢӨ');if(btn){btn.disabled=false;btn.innerHTML=syncBtnHTML();}return;}

  const payload=JSON.stringify({action:'sync',rows});
  let success=false;
  let lastError='';

  // мөңлҢҖ 2нҡҢ мӢңлҸ„
  for(let attempt=0;attempt<2;attempt++){
    try{
      const controller=new AbortController();
      const tid=setTimeout(()=>controller.abort(),10000);

      // Google Apps Script POST (redirect:'follow'лЎң 302 мІҳлҰ¬)
      const res=await fetch(state.url,{
        method:'POST',
        redirect:'follow',
        signal:controller.signal,
        headers:{'Content-Type':'text/plain;charset=utf-8'},
        body:payload
      });
      clearTimeout(tid);

      // мқ‘лӢө мІҳлҰ¬ (лӢӨм–‘н•ң мјҖмқҙмҠӨ лҢҖмқ‘)
      if(res.ok||res.status===200||res.type==='opaque'||res.redirected){
        try{
          const text=await res.text();
          if(text&&!text.startsWith('<')){
            const json=JSON.parse(text);
            if(json.status==='ok'||json.inserted!==undefined||json.edited!==undefined){
              success=true;break;
            }
          }
          // POSTлҠ” м„ұкіөн–Ҳм§Җл§Ң GET лҰ¬лӢӨмқҙл үнҠё кІ°кіјк°Җ мқҙмғҒн•ң кІҪмҡ°
          // вҶ’ pingмңјлЎң м—°кІ° нҷ•мқён•ҳм—¬ м„ұкіө м—¬л¶Җ нҢҗлі„
          const verify=await fetch(state.url+'?action=ping',{redirect:'follow'});
          const vText=await verify.text();
          if(!vText.startsWith('<')){success=true;break;}
        }catch(parseErr){
          // нҢҢмӢұ мӢӨнҢЁм§Җл§Ң fetch мһҗмІҙлҠ” м„ұкіө вҶ’ м ҖмһҘ м„ұкіөмңјлЎң к°„мЈј
          success=true;break;
        }
      }else{
        lastError='HTTP '+res.status;
      }
    }catch(e){
      lastError=e.name==='AbortError'?'нғҖмһ„м•„мӣғ(10мҙҲ)':e.message;
      if(attempt===0)await new Promise(r=>setTimeout(r,500));
    }
  }

  if(success){
    // 41көҗкө¬ нҶөн•© мӢңнҠём—җлҸ„ м ҖмһҘ (мӢӨнҢЁ л¬ҙмӢң)
    const dashUrl=await sget('dash41:url');
    if(dashUrl&&dashUrl.length>10){
      try{await fetch(dashUrl,{method:'POST',redirect:'follow',
        headers:{'Content-Type':'text/plain;charset=utf-8'},body:payload});}catch(e){}
    }

    toast(`${rows.length}лӘ… м ҖмһҘ мҷ„лЈҢ! вң“`);
    state.unsaved=false;
    state.touched=new Set();
    state.dataSource='sheet';
    state._sheetError=null;
    const uel=document.getElementById('unsaved-badge');
    if(uel)uel.style.display='none';
    await sset(SK(state.week),JSON.stringify(state.data));
    await markWeekSaved(state.week);
  }else{
    toast('м ҖмһҘ мӢӨнҢЁ: '+lastError);
  }
  if(btn){btn.disabled=false;btn.innerHTML=syncBtnHTML();}
}

function exportCSV(){
  const d=state.data,hd='лӮ м§ң,көҗкө¬,мқҙлҰ„,м—ӯн• ,м¶ңм„қ,м„ұкІҪмқҪкё°,м„ұкІҪм“°кё°,м„ұкІҪнғҖмқҙн•‘,м•”мҶЎ,м „лҸ„,кө¬м—ӯлҙүмӮ¬,мЈјмқјлҙүмӮ¬,м–‘мңЎ,м–‘нҷ”м§„м•ҲлӮҙ,нҷҳкІҪліҙнҳё,кө¬м—ӯлӘЁмһ„мһҘмҶҢ,кІЁмҡёл°©н•ҷм„ұкІҪмқҪкё°,м„ұкІҪнҶөлҸ…мҲҳл ЁнҡҢ,мҙқм җ';
  const rows=state.members.filter(m=>hasFilled(d[m.n])).map(m=>{const md=d[m.n]||empty();return [state.week,P_ID,m.n,m.r,md.at?'O':'X',md.br||0,md.bw||0,md.bt||0,md.me?'O':'X',md.ev?'O':'X',md.ds?'O':'X',md.ss?'O':'X',md.nu?'O':'X',md.mg?'O':'X',md.en?'O':'X',md.mp?'O':'X',md.wb||0,md.bm?'O':'X',score(md)].join(',');});
  if(rows.length===0){toast('мһ…л Ҙлҗң лҚ°мқҙн„°к°Җ м—ҶмҠөлӢҲлӢӨ');return;}
  const csv='\uFEFF'+[hd,...rows].join('\n');const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));a.download=`${P_LABEL}_${state.week}.csv`;a.click();toast('CSV лӢӨмҡҙлЎңл“ң мҷ„лЈҢ!');
}

async function getGateway(){
  // 1мҲңмң„: мҪ”л“ңм—җ лӮҙмһҘлҗң URL
  if(GATEWAY_URL&&GATEWAY_URL.length>10)return GATEWAY_URL;

  return null;
}

async function authWithCode(){
  const el=document.getElementById('access-code');
  const errEl=document.getElementById('auth-error');
  const btn=document.getElementById('auth-btn');
  if(!el)return;
  const code=el.value.trim();
  if(!code){if(errEl){errEl.textContent='м ‘мҶҚмҪ”л“ңлҘј мһ…л Ҙн•ҙмЈјм„ёмҡ”';errEl.style.display='block';}return;}

  const gw=await getGateway();
  if(!gw){
    if(errEl){errEl.textContent='кІҢмқҙнҠёмӣЁмқҙ URLмқҙ м„Өм •лҗҳм§Җ м•Ҡм•ҳмҠөлӢҲлӢӨ';errEl.style.display='block';}
    return;
  }

  if(btn){btn.disabled=true;btn.textContent='мқёмҰқ мӨ‘...';}
  if(errEl)errEl.style.display='none';

  try{
    const res=await fetch(gw+'?action=auth&code='+encodeURIComponent(code),{redirect:'follow'});
    const text=await res.text();
    if(text.startsWith('<'))throw new Error('м—°кІ° мӢӨнҢЁ');
    const json=JSON.parse(text);

    if(json.status==='ok'&&json.script_url&&json.script_url.length>10){
      state.url=json.script_url;
      await sset(UK,json.script_url);
      await sset('dash41:url',gw);
      await sset('ch:gateway',gw);
      state.gatewayUrl=gw;
      toast('м ‘мҶҚ м„ұкіө! '+json.parish_name);
      state.ready=true;
      await loadMembers();
      await loadWeek();
      return;
    }else{
      if(errEl){errEl.textContent=json.message||'мқёмҰқ мӢӨнҢЁ';errEl.style.display='block';}
    }
  }catch(e){
    if(errEl){errEl.textContent='м„ңлІ„ м—°кІ° мӢӨнҢЁ вҖ” URLмқ„ нҷ•мқён•ҙмЈјм„ёмҡ”';errEl.style.display='block';}
  }
  if(btn){btn.disabled=false;btn.textContent='м ‘мҶҚ';}
}

  else if(GATEWAY_URL&&GATEWAY_URL.length>10){state.gatewayUrl=GATEWAY_URL;await sset('ch:gateway',GATEWAY_URL);}

  // лЎңм»¬м—җ URLмқҙ мһҲмңјл©ҙ мһҗлҸҷ лЎңк·ёмқё
  const url=await sget(UK);
  if(url&&url.length>10){
    state.url=url;
    state.ready=true;

    // лЎңм»¬ мәҗмӢң мҙҲкё°нҷ” (мӢңнҠё DATA нғӯмқҙ м§„мӢӨмқҳ мӣҗмІң)
    const wk=state.week;
    await sset(SK(wk),'');
    state.savedWeeks={};
    await sset(WK,'{}');

    await loadMembers();
    await loadWeek();
  }else{
    state.ready=false;
    render();
  }
})();
</script>
