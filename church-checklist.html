<script>
const P_ID='4133',P_LABEL='4133구역';
const FALLBACK_MEMBERS=[
  {n:'성미선',r:'구역장'},{n:'박성규',r:'권찰'},{n:'고요한',r:'구역원'},{n:'김성이B',r:'구역원'},
  {n:'김진선C',r:'구역원'},{n:'박종민A',r:'구역원'},{n:'범하나',r:'구역원'},{n:'이상규',r:'구역원'},
  {n:'이수영',r:'구역원'},{n:'정동진',r:'구역원'},{n:'정희진B',r:'구역원'},{n:'제영호',r:'구역원'},
  {n:'조정연',r:'구역원'},{n:'지명희',r:'구역원'},{n:'이상인A',r:'구역원'},{n:'안성민',r:'구역원'},
  {n:'이재영A',r:'구역원'},{n:'장서연B',r:'구역원'}
];
const ITEMS=[
  {k:'at',l:'출석',s:20,t:'c',g:0},{k:'br',l:'성경읽기',s:1,u:'장',t:'n',g:1},
  {k:'bw',l:'성경쓰기',s:5,u:'쪽',t:'n',g:1},{k:'bt',l:'성경타이핑',s:2,u:'쪽',t:'n',g:1},
  {k:'me',l:'암송',s:3,t:'c',g:2},{k:'ev',l:'전도',s:50,t:'c',g:2},
  {k:'ds',l:'구역봉사',s:100,t:'c',g:3},{k:'ss',l:'주일/봉사팀 봉사',s:30,t:'c',g:3},
  {k:'nu',l:'양육',s:10,t:'c',g:2},{k:'mg',l:'양화진/순교자 안내',s:20,t:'c',g:3},
  {k:'en',l:'환경보호점수',s:100,t:'c',g:4},{k:'mp',l:'구역모임 장소',s:100,t:'c',g:4},
  {k:'wb',l:'겨울방학 성경읽기',s:1,u:'장',t:'n',g:4},{k:'bm',l:'성경 통독수련회',s:1189,t:'c',g:4}
];
const GROUPS=[{l:'📖 성경',g:1},{l:'🙏 신앙생활',g:2},{l:'🤝 봉사',g:3},{l:'⭐ 특별항목',g:4}];
const MAP_TO_SHEET={at:'attendance',br:'bible_read',bw:'bible_write',bt:'bible_typing',me:'memorize',ev:'evangelism',ds:'district_service',ss:'sunday_service',nu:'nurture',mg:'martyr_guide',en:'environment',mp:'meeting_place',wb:'winter_bible',bm:'bible_marathon'};
const MAP_FROM_SHEET={};Object.entries(MAP_TO_SHEET).forEach(([k,v])=>MAP_FROM_SHEET[v]=k);

let sundays=[];
(function(){const now=new Date();for(let i=-6;i<=4;i++){const d=new Date(now);const day=d.getDay();d.setDate(d.getDate()-day+(day===0?0:7)+i*7);d.setHours(0,0,0,0);const m=d.getMonth()+1,dt=d.getDate();sundays.push({k:`${d.getFullYear()}-${String(m).padStart(2,'0')}-${String(dt).padStart(2,'0')}`,l:`${m}/${dt}`,ts:d.getTime()});}})();

// ═══ 상태 ═══
let state={url:'',week:'',data:{},members:[],expanded:null,view:'list',ready:false,loading:false,addingMember:false,dataSource:'',savedWeeks:{},lastModified:null,unsaved:false,touched:new Set()};
state.week=(function(){let c=sundays[0],now=Date.now();for(const s of sundays)if(Math.abs(s.ts-now)<Math.abs(c.ts-now))c=s;return c.k;})();

function empty(){const d={};ITEMS.forEach(i=>d[i.k]=i.t==='c'?false:'');return d;}
function emptyAll(){const o={};state.members.forEach(m=>o[m.n]=empty());return o;}
function score(d){if(!d)return 0;let t=0;ITEMS.forEach(i=>{if(i.t==='c'&&d[i.k])t+=i.s;else if(i.t==='n')t+=(parseInt(d[i.k])||0)*i.s;});return t;}
function filled(d){if(!d)return 0;let c=0;ITEMS.forEach(i=>{if(i.t==='c'&&d[i.k])c++;else if(i.t==='n'&&parseInt(d[i.k])>0)c++;});return c;}
function hasFilled(d){return filled(d)>0;}
function hasAnyData(d){return state.members.some(m=>hasFilled(d[m.n]));}

// ═══ 스토리지 (Claude 아티팩트 + 일반 브라우저 호환) ═══
const SK=w=>`ch4133:${w}`,UK='ch4133:url',MK='ch4133:members',WK='ch4133:savedWeeks';
const HAS_CLOUD=typeof window.storage!=='undefined'&&window.storage&&typeof window.storage.get==='function';

async function sget(k){
  // 1. window.storage (Claude 아티팩트)
  if(HAS_CLOUD){
    try{const r=await window.storage.get(k);if(r&&r.value!==undefined&&r.value!==null)return r.value;return null;}catch{}
  }
  // 2. localStorage (일반 브라우저/핸드폰)
  try{return localStorage.getItem(k);}catch{return null;}
}
async function sset(k,v){
  let ok=false;
  if(HAS_CLOUD){
    try{const r=await window.storage.set(k,v);ok=!!r;}catch{}
  }
  try{localStorage.setItem(k,v);ok=true;}catch{}
  return ok;
}
async function sdel(k){
  if(HAS_CLOUD){try{await window.storage.delete(k);}catch{}}
  try{localStorage.removeItem(k);}catch{}
}

// ═══ 저장된 주차 관리 ═══
async function markWeekSaved(weekKey){
  state.savedWeeks[weekKey]=true;
  await sset(WK,JSON.stringify(state.savedWeeks));
}
async function loadSavedWeeks(){
  const raw=await sget(WK);
  if(raw)state.savedWeeks=JSON.parse(raw);
}

// ═══ 데이터 저장 (매 변경마다 로컬에 저장) ═══
async function saveData(){
  state.lastModified=new Date();
  state.unsaved=true;
  const json=JSON.stringify(state.data);
  const ok=await sset(SK(state.week),json);
  if(ok&&hasAnyData(state.data))await markWeekSaved(state.week);
  // 최종수정 시간 UI 업데이트
  const el=document.getElementById('last-mod');
  if(el){
    const t=state.lastModified;
    el.textContent='최종수정 '+t.getHours()+':'+String(t.getMinutes()).padStart(2,'0')+':'+String(t.getSeconds()).padStart(2,'0');
    el.style.display='inline';
  }
  const uel=document.getElementById('unsaved-badge');
  if(uel)uel.style.display='inline';
}

// ═══ 구역원 불러오기 ═══
async function loadMembers(){
  if(state.url){
    try{
      const res=await fetch(state.url+'?action=members&parish='+P_ID,{redirect:'follow'});
      const text=await res.text();
      if(!text.startsWith('<')){
        const json=JSON.parse(text);
        if(json.members&&json.members.length>0){
          state.members=json.members.map(m=>({n:m.name,r:m.role}));
          await sset(MK,JSON.stringify(state.members));return;
        }
      }
    }catch(e){}
  }
  const cached=await sget(MK);
  if(cached){state.members=JSON.parse(cached);return;}
  state.members=[...FALLBACK_MEMBERS];
}

// ═══ 주간 데이터 불러오기 (구글시트 = 주 저장소) ═══
async function loadWeek(){
  state.loading=true;state.dataSource='';render();

  // 1단계: 구글 시트에서 불러오기 (주 저장소)
  if(state.url){
    try{
      const fromSheet=await fetchFromSheet(state.week);
      if(fromSheet){
        state.data=fromSheet;
        state.dataSource='sheet';
        // 로컬에도 캐시
        await sset(SK(state.week),JSON.stringify(state.data));
        await markWeekSaved(state.week);
        state.loading=false;
        render();
        return;
      }
    }catch(e){console.log('Sheet load failed, trying local:',e);}
  }

  // 2단계: 시트에 없으면 → 로컬 캐시 확인 (오프라인/백업)
  try{
    const raw=await sget(SK(state.week));
    if(raw&&raw.length>10){
      const localData=JSON.parse(raw);
      state.data={...emptyAll(),...localData};
      Object.keys(localData).forEach(k=>{if(!state.data[k])state.data[k]=localData[k];});
      state.dataSource='local';
      state.loading=false;
      render();
      toast('로컬 캐시에서 불러옴 (시트 동기화 필요)');
      return;
    }
  }catch(e){}

  // 3단계: 둘 다 없으면 새 주간
  state.data=emptyAll();
  state.dataSource='empty';
  state.loading=false;
  render();
}

// ═══ 시트에서 데이터 가져오기 (공통) ═══
async function fetchFromSheet(weekKey){
  if(!state.url)return null;
  try{
    const url=state.url+'?action=read&date='+encodeURIComponent(weekKey)+'&parish='+P_ID;
    const res=await fetch(url,{redirect:'follow'});
    const text=await res.text();
    // Apps Script 가 HTML 을 반환하는 경우 (리다이렉트 실패)
    if(text.startsWith('<')){console.log('Sheet returned HTML, not JSON');return null;}
    const json=JSON.parse(text);
    if(json.rows&&json.rows.length>0){
      const loaded=emptyAll();
      json.rows.forEach(r=>{
        const name=r.member_name;
        if(!loaded[name])loaded[name]=empty();
        Object.entries(MAP_FROM_SHEET).forEach(([sheetKey,appKey])=>{
          const item=ITEMS.find(i=>i.k===appKey);if(!item)return;
          const val=r[sheetKey];
          if(item.t==='c')loaded[name][appKey]=(val==='O'||val===true);
          else if(item.t==='n')loaded[name][appKey]=val?String(val):'';
        });
      });
      return loaded;
    }
    return null;
  }catch(e){
    console.log('fetchFromSheet error:',e);
    state._lastError='시트 읽기 실패: '+e.message;
    return null;
  }
}

// ═══ 시트에서 강제 새로고침 ═══
async function forceLoadFromSheet(){
  if(!state.url){toast('시트 연동이 필요합니다');return;}
  state.loading=true;render();
  const fromSheet=await fetchFromSheet(state.week);
  if(fromSheet){

async function addMember(){
  const nameEl=document.getElementById('add-name'),roleEl=document.getElementById('add-role');
  if(!nameEl)return;const name=nameEl.value.trim(),role=roleEl?roleEl.value:'구역원';
  if(!name){toast('이름을 입력해주세요');return;}
  if(state.members.some(m=>m.n===name)){toast('이미 등록된 이름입니다');return;}
  if(state.url){try{await fetch(state.url,{method:'POST',redirect:'follow',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action:'addMember',name,role,parish_id:P_ID})});}catch{}}
  state.members.push({n:name,r:role});state.data[name]=empty();
  await sset(MK,JSON.stringify(state.members));
  state.addingMember=false;toast(name+' 추가 완료');render();
}

function ckItem(name,k){if(!state.data[name])state.data[name]=empty();state.data[name][k]=!state.data[name][k];state.touched.add(name);saveData();const el=document.getElementById('tb-'+CSS.escape(name)+'-'+k);if(el){if(state.data[name][k]){el.classList.add('on');el.textContent='O';}else{el.classList.remove('on');el.textContent='X';}}updateMemberInfo(name);updateSummary();}
function numAdj(name,k,delta){if(!state.data[name])state.data[name]=empty();const v=Math.max(0,(parseInt(state.data[name][k])||0)+delta);state.data[name][k]=String(v);state.touched.add(name);saveData();const el=document.getElementById('ni-'+CSS.escape(name)+'-'+k);if(el)el.value=v;updateMemberInfo(name);updateSummary();}
function numSet(name,k,v){if(!state.data[name])state.data[name]=empty();state.data[name][k]=v;state.touched.add(name);saveData();updateMemberInfo(name);updateSummary();}

      if(el)el.innerHTML=du&&du.length>10?'<span style="color:#2e7d32">✓ 연결됨</span>':'<span style="color:#e65100">미연결</span>';
    })();
  }
}

function syncBtnHTML(){return '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" style="margin-right:6px"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>구글 시트 저장';}

async function syncSheet(){
  if(!state.url)return toast('URL이 없습니다');
  const btn=document.getElementById('sync-btn');
  if(btn){btn.disabled=true;btn.textContent='저장 중...';}
  const d=state.data;

  // 수정된 구역원(touched) + 데이터 있는 구역원 모두 포함
  const targets=state.members.filter(m=>state.touched.has(m.n)||hasFilled(d[m.n]));
  const rows=targets.map(m=>{
    const md=d[m.n]||empty();
    const r={report_date:state.week,parish_id:P_ID,member_name:m.n,role:m.r,total_score:score(md),recorded_by:'모바일앱'};
    ITEMS.forEach(it=>{const key=MAP_TO_SHEET[it.k];if(it.t==='c')r[key]=md[it.k]?'O':'X';else if(it.t==='n')r[key]=parseInt(md[it.k])||0;});
    return r;
  });
  if(rows.length===0){toast('입력된 데이터가 없습니다');if(btn){btn.disabled=false;btn.innerHTML=syncBtnHTML();}return;}
  try{
    // 1. 구역 시트에 저장
    await fetch(state.url,{
      method:'POST',redirect:'follow',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body:JSON.stringify({action:'sync',rows})
    });

    // 2. 41교구 통합 시트에도 저장
    const dashUrl=await sget('dash41:url');
    if(dashUrl&&dashUrl.length>10){
      try{
        await fetch(dashUrl,{
          method:'POST',redirect:'follow',
          headers:{'Content-Type':'text/plain;charset=utf-8'},
          body:JSON.stringify({action:'sync',rows})
        });
      }catch(e){}
    }

    toast(`${rows.length}명 저장 완료! ✓`);
    state.unsaved=false;
    state.touched=new Set();
    const uel=document.getElementById('unsaved-badge');
    if(uel)uel.style.display='none';
    await sset(SK(state.week),JSON.stringify(state.data));
    await markWeekSaved(state.week);
  }catch{toast('실패 — 다시 시도해주세요');}
  if(btn){btn.disabled=false;btn.innerHTML=syncBtnHTML();}
}

function exportCSV(){
  const d=state.data,hd='날짜,교구,이름,역할,출석,성경읽기,성경쓰기,성경타이핑,암송,전도,구역봉사,주일봉사,양육,양화진안내,환경보호,구역모임장소,겨울방학성경읽기,성경통독수련회,총점';
  const rows=state.members.filter(m=>hasFilled(d[m.n])).map(m=>{const md=d[m.n]||empty();return [state.week,P_ID,m.n,m.r,md.at?'O':'X',md.br||0,md.bw||0,md.bt||0,md.me?'O':'X',md.ev?'O':'X',md.ds?'O':'X',md.ss?'O':'X',md.nu?'O':'X',md.mg?'O':'X',md.en?'O':'X',md.mp?'O':'X',md.wb||0,md.bm?'O':'X',score(md)].join(',');});
  if(rows.length===0){toast('입력된 데이터가 없습니다');return;}
  const csv='\uFEFF'+[hd,...rows].join('\n');const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));a.download=`${P_LABEL}_${state.week}.csv`;a.click();toast('CSV 다운로드 완료!');
}

// URL 저장 (로컬 + 시트 URL탭)
async function saveUrl(){
  const el=document.getElementById('url-input');
  const u=el?el.value.trim():'';
  if(!u){toast('URL을 입력해주세요');return;}
  if(!u.startsWith('https://script.google.com/')){toast('올바른 Apps Script URL이 아닙니다');return;}

  // 1. 로컬에 저장
  state.url=u;
  await sset(UK,u);

  // 2. Apps Script에 ping → URL 탭에 자동 저장됨
  try{
    const res=await fetch(u+'?action=ping',{redirect:'follow'});
    const text=await res.text();
    if(!text.startsWith('<')){
      toast('URL 저장 완료! (시트 URL탭에 기록됨)');
    }else{
      toast('URL 저장됨 (시트 연결 확인 필요)');
    }
  }catch(e){
    toast('URL 저장됨 (시트 연결은 다음에 확인)');
  }

  // 설정 화면 갱신 (저장된 상태로)
  render();
}

// 체크리스트 시작 (saveSetup 호환)
async function saveSetup(){await saveUrl();}
async function goToApp(){state.ready=true;await loadMembers();await loadWeek();}
async function clearUrl(){state.url='';await sset(UK,'');toast('연동 해제됨');render();}

async function saveDashUrl(){
  const el=document.getElementById('dash-url-input');
  const u=el?el.value.trim():'';
  if(!u){toast('URL을 입력해주세요');return;}
  if(!u.startsWith('https://script.google.com/')){toast('올바른 URL이 아닙니다');return;}

  // 1. 로컬에 41교구 URL 저장
  await sset('dash41:url',u);

  // 2. 41교구 시트에 ping (URL탭 자동 저장)
  try{
    await fetch(u+'?action=ping',{redirect:'follow'});
  }catch(e){}

  // 3. 41교구 시트의 URL탭에 4133구역 정보 등록
  if(state.url){
    try{
      await fetch(u,{
        method:'POST',
        redirect:'follow',
        headers:{'Content-Type':'text/plain;charset=utf-8'},
        body:JSON.stringify({
          action:'setUrl',
          parish_id:P_ID,
          url:state.url,
          sheet_name:'2026년 구역보고서('+P_LABEL+')_구역용_DATA'
        })
      });
      toast('41교구 연동 완료! ('+P_LABEL+' URL 등록됨)');
    }catch(e){
      toast('41교구 URL 저장됨 (교구 등록은 재시도 필요)');
    }
  }else{
    toast('41교구 URL 저장됨 (구역 URL 먼저 설정 필요)');
  }
  render();
}
async function skipSetup(){state.url='';await sset(UK,'');state.ready=true;state.members=[...FALLBACK_MEMBERS];await sset(MK,JSON.stringify(state.members));await loadWeek();}
function showSetup(){state.ready=false;render();}
