var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlicGV5eHpxemNjZnZjYXZlbHVoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyMzA0MTksImV4cCI6MjA5MTgwNjQxOX0.RpsniUKYkfDCJmgKSL6jme3viKoIWxbvojReuEZuDgk';

var sb = window.supabase.createClient(SB_URL, SB_KEY);

var ITEMS=[

  {k:'bm',l:'성경 통독수련회',s:1189,t:'c',g:4,c:'bible_marathon'},
  {k:'fu',l:'후속모임',s:0,t:'c',g:0.5,c:'followup_meeting',leaderOnly:true}

var GROUPS=[{l:'👥 구역장',g:0.5},{l:'📖 성경',g:1},{l:'🙏 신앙생활',g:2},{l:'🤝 봉사',g:3},{l:'⭐ 특별항목',g:4}];

// KST 현재 시간
function kstNow(){var now=new Date();var utc=now.getTime()+now.getTimezoneOffset()*60000;return new Date(utc+9*3600000);}
function kstDateStr(){var k=kstNow();return k.getFullYear()+'년 '+(k.getMonth()+1)+'월 '+k.getDate()+'일 ('+['일','월','화','수','목','금','토'][k.getDay()]+') '+String(k.getHours()).padStart(2,'0')+':'+String(k.getMinutes()).padStart(2,'0');}

var sundays=[];
(function(){var now=kstNow();for(var i=-12;i<=8;i++){var d=new Date(now);var day=d.getDay();d.setDate(d.getDate()-day+(day===0?0:7)+i*7);d.setHours(0,0,0,0);var m=d.getMonth()+1,dt=d.getDate();sundays.push({k:d.getFullYear()+'-'+String(m).padStart(2,'0')+'-'+String(dt).padStart(2,'0'),l:m+'/'+dt,ts:d.getTime()});}})();

var S={pid:'',pname:'',role:'',week:'',data:{},members:[],expanded:null,view:'list',ready:false,loading:false,addingMember:false,unsaved:false,touched:{},lastMod:null,adminMode:false};
S.week=(function(){
  var now=kstNow(),todayMs=new Date(now.getFullYear(),now.getMonth(),now.getDate()).getTime();
  var best=sundays[0],bestDiff=Math.abs(sundays[0].ts-todayMs);
  for(var i=1;i<sundays.length;i++){var diff=Math.abs(sundays[i].ts-todayMs);if(diff<bestDiff){best=sundays[i];bestDiff=diff;}}
  return best.k;
})();

function empty(){var d={};ITEMS.forEach(function(i){d[i.k]=i.t==='c'?false:'';});return d;}
function emptyAll(){var o={};S.members.forEach(function(m){o[m.n]=empty();});return o;}
function score(d){if(!d)return 0;var t=0;ITEMS.forEach(function(i){if(i.t==='c'&&d[i.k])t+=i.s;else if(i.t==='n'){var sc=(parseInt(d[i.k])||0)*i.s;if(i.k==='br'&&sc>30)sc=30;if(i.k==='wb'&&sc>390)sc=390;t+=sc;}});return t;}
function filled(d){if(!d)return 0;var c=0;ITEMS.forEach(function(i){if(i.t==='c'&&d[i.k])c++;else if(i.t==='n'&&parseInt(d[i.k])>0)c++;});return c;}
function hasFilled(d){return filled(d)>0;}
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2200);}
function esc(s){return s.replace(/'/g,"\\'");}

async function loadMembers(){
  var r=await sb.from('members').select('name,role,state').eq('parish_id',S.pid).order('created_at');
  if(r.data&&r.data.length>0)S.members=r.data.filter(function(m){return m.state!=='Delete';}).map(function(m){return{n:m.name,r:m.role};});
}
async function loadWeek(){
  S.loading=true;render();
  var r=await sb.from('reports').select('*').eq('report_date',S.week).eq('parish_id',S.pid);
  S.data=emptyAll();
  if(r.data&&r.data.length>0){
    r.data.filter(function(row){return row.state!=='Delete';}).forEach(function(row){
      if(!S.data[row.member_name])S.data[row.member_name]=empty();
      ITEMS.forEach(function(it){var v=row[it.c];if(it.t==='c')S.data[row.member_name][it.k]=(v==='O');else S.data[row.member_name][it.k]=v?String(v):'';});
    });
  }
  S.loading=false;render();
}
async function saveToDb(){
  var btn=document.getElementById('sync-btn');if(btn){btn.disabled=true;btn.textContent='저장 중...';}
  var targets=S.members.filter(function(m){return S.touched[m.n]||hasFilled(S.data[m.n]);});
  if(!targets.length){toast('데이터 없음');if(btn){btn.disabled=false;btn.innerHTML=saveBtnHTML();}return;}
  var rows=targets.map(function(m){
    var md=S.data[m.n]||empty();
    var row={report_date:S.week,parish_id:S.pid,member_name:m.n,role:m.r,total_score:score(md),recorded_by:'앱',state:'Edit',recorded_at:new Date().toISOString()};
    ITEMS.forEach(function(it){row[it.c]=it.t==='c'?(md[it.k]?'O':'X'):(parseInt(md[it.k])||0);});return row;
  });
  var r=await sb.from('reports').upsert(rows,{onConflict:'report_date,parish_id,member_name'});
  if(!r.error){toast(rows.length+'명 저장 완료 ✓');S.unsaved=false;S.touched={};var u=document.getElementById('unsaved-badge');if(u)u.style.display='none';}
  else toast('저장 실패: '+r.error.message);
  if(btn){btn.disabled=false;btn.innerHTML=saveBtnHTML();}
}
function saveBtnHTML(){return '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" style="margin-right:6px"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z" stroke="#fff" stroke-width="2"/><path d="M17 21v-8H7v8M7 3v5h8" stroke="#fff" stroke-width="2"/></svg>저장';}
async function addMember(){
  var ne=document.getElementById('add-name'),re=document.getElementById('add-role');if(!ne)return;
  var name=ne.value.trim(),role=re?re.value:'구역원';
  if(!name){toast('이름 입력');return;}if(S.members.some(function(m){return m.n===name;})){toast('이미 등록');return;}
  var r=await sb.from('members').insert({parish_id:S.pid,name:name,role:role});
  if(!r.error){S.members.push({n:name,r:role});S.data[name]=empty();S.addingMember=false;toast(name+' 추가');render();}
}
async function delMember(name){
  var pw=prompt('구역원을 삭제하려면 관리자 비밀번호를 입력하세요.\n\n삭제 대상: '+name);
  if(!pw)return;

  toast('관리자 권한 확인 중...');
  // 독립된 storageKey로 임시 클라이언트 생성 (메인 세션과 충돌 방지)
  var tempSb=window.supabase.createClient(SB_URL,SB_KEY,{
    auth:{persistSession:false,autoRefreshToken:false,detectSessionInUrl:false,storageKey:'_temp_admin_'+Date.now()}
  });
  var auth=await tempSb.auth.signInWithPassword({email:'admin@c41.app',password:pw});
  if(auth.error){toast('관리자 비밀번호가 올바르지 않습니다');return;}
  await tempSb.auth.signOut();

  if(!confirm(name+'님을 삭제하시겠습니까?\n기존 출석 이력은 보존됩니다.'))return;

  // 메인 세션 복원 확인 (중요!)
  var sess=await sb.auth.getSession();
  if(!sess.data.session){toast('세션 만료 — 다시 로그인해주세요');S.ready=false;render();return;}

  // 소프트 삭제 (Prefer: return=minimal 헤더로 UPDATE 후 SELECT 회피)
  var r1=await sb.from('members').update({state:'Delete',deleted_at:new Date().toISOString(),deleted_by:'admin'},{count:'exact'}).eq('parish_id',S.pid).eq('name',name);
  var r2=await sb.from('reports').update({state:'Delete'},{count:'exact'}).eq('parish_id',S.pid).eq('member_name',name);

  if(!r1.error){
    S.members=S.members.filter(function(m){return m.n!==name;});
    delete S.data[name];
    S.expanded=null;
    toast(name+' 삭제 완료 (이력 보존)');
    render();
  }else{toast('삭제 실패: '+r1.error.message);}
}

function updateSummary(){var d=S.data,M=S.members,ac=M.filter(function(m){return d[m.n]&&d[m.n].at;}).length,ts=M.reduce(function(s,m){return s+score(d[m.n]);},0),att=M.filter(function(m){return d[m.n]&&d[m.n].at;}).map(function(m){return m.n;});var a=document.getElementById('s-ac'),t=document.getElementById('s-ts'),at=document.getElementById('s-att');if(a)a.textContent=ac;if(t)t.textContent=ts.toLocaleString();if(at){at.innerHTML=att.length>0?'<b>참석: </b>'+att.join(', '):'';at.style.display=att.length>0?'block':'none';}}
function updateMI(n){var d=S.data[n]||empty(),sc_=score(d),fc=filled(d);var i=document.getElementById('mi-'+CSS.escape(n)),s=document.getElementById('ms-'+CSS.escape(n));if(i)i.innerHTML=fc>0?fc+'개 항목 · '+sc_+'점':'';if(s){s.textContent=sc_>0?sc_:'';s.style.display=sc_>0?'':'none';}}
function markUnsaved(){S.unsaved=true;S.lastMod=new Date();var e=document.getElementById('last-mod');if(e){e.textContent='수정 '+S.lastMod.getHours()+':'+String(S.lastMod.getMinutes()).padStart(2,'0');e.style.display='inline';}var u=document.getElementById('unsaved-badge');if(u)u.style.display='inline';}

function ckAt(n,e){if(e)e.stopPropagation();if(!S.data[n])S.data[n]=empty();S.data[n].at=!S.data[n].at;S.touched[n]=true;markUnsaved();var el=document.getElementById('ck-'+CSS.escape(n));if(el){if(S.data[n].at)el.classList.add('on');else el.classList.remove('on');}updateMI(n);updateSummary();}
function ckItem(n,k){if(!S.data[n])S.data[n]=empty();S.data[n][k]=!S.data[n][k];S.touched[n]=true;markUnsaved();var el=document.getElementById('tb-'+CSS.escape(n)+'-'+k);if(el){if(S.data[n][k]){el.classList.add('on');el.textContent='O';}else{el.classList.remove('on');el.textContent='X';}}updateMI(n);updateSummary();}
function numAdj(n,k,d){if(!S.data[n])S.data[n]=empty();var v=Math.max(0,(parseInt(S.data[n][k])||0)+d);S.data[n][k]=String(v);S.touched[n]=true;markUnsaved();var el=document.getElementById('ni-'+CSS.escape(n)+'-'+k);if(el)el.value=v;updateMI(n);updateSummary();}
function numSet(n,k,v){if(!S.data[n])S.data[n]=empty();S.data[n][k]=v;S.touched[n]=true;markUnsaved();updateMI(n);updateSummary();}
function toggle(n){S.expanded=S.expanded===n?null:n;render();}
function setView(v){S.view=v;render();}
function showAdd(){S.addingMember=true;render();}
function hideAdd(){S.addingMember=false;render();}
async function setWeek(k){S.week=k;S.expanded=null;S.unsaved=false;S.touched={};S.lastMod=null;await loadWeek();}
function render(){var sy=window.scrollY;_render();requestAnimationFrame(function(){window.scrollTo(0,sy);});}

function renderLogin(){
  document.getElementById('app').innerHTML='<div class="login"><div class="login-c">'
    +'<div style="font-size:42px;text-align:center">⛪</div>'
    +'<h1>구역보고서</h1>'
    +'<div class="err" id="login-err"></div>'
    +'<label for="login-id">아이디</label>'
    +'<input id="login-id" type="text" placeholder="교구번호 또는 admin" autocomplete="username" autocapitalize="off" spellcheck="false">'
    +'<label for="login-pw">비밀번호</label>'
    +'<input id="login-pw" type="password" placeholder="비밀번호" autocomplete="current-password">'
    +'<button class="btn" id="login-btn" onclick="doLogin()">로그인</button>'
    +'</div></div>';
  var idEl=document.getElementById('login-id');
  if(idEl)idEl.focus();
  var pwEl=document.getElementById('login-pw');
  if(pwEl)pwEl.addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});
  if(idEl)idEl.addEventListener('keydown',function(e){if(e.key==='Enter')document.getElementById('login-pw').focus();});
}

async function doLogin(){
  var idEl=document.getElementById('login-id'),pwEl=document.getElementById('login-pw');
  var errEl=document.getElementById('login-err'),btn=document.getElementById('login-btn');
  var uid=idEl?idEl.value.trim():'',pw=pwEl?pwEl.value:'';
  if(!uid||!pw){if(errEl){errEl.textContent='아이디와 비밀번호를 입력하세요';errEl.style.display='block';}return;}
  if(btn){btn.disabled=true;btn.textContent='로그인 중...';}
  if(errEl)errEl.style.display='none';
  var email=(uid==='admin')?'admin@c41.app':'u'+uid+'@c41.app';
  var r=await sb.auth.signInWithPassword({email:email,password:pw});
  if(r.error){
    if(errEl){errEl.textContent=r.error.message;errEl.style.display='block';}
    if(btn){btn.disabled=false;btn.textContent='로그인';}return;
  }
  await onAuth(r.data.user);
}

async function onAuth(user){
  var meta=user.user_metadata||{};
  S.role=meta.role||'parish';
  // admin이 특정 교구 보려는 경우 (?parish=4133)
  if(S.role==='admin'){
    var qp=new URLSearchParams(window.location.search);
    var pid=qp.get('parish');
    if(pid){
      S.pid=pid;S.pname=pid+'구역 (관리자)';S.adminMode=true;
      S.ready=true;await loadMembers();await loadWeek();return;
    }
    // parish 파라미터 없으면 대시보드로
    window.location.href='church-dashboard.html';return;
  }
  // 일반 교구원
  S.pid=meta.parish_id||'';S.pname=meta.name||'';S.adminMode=false;
  S.ready=true;await loadMembers();await loadWeek();
}
function backToDashboard(){window.location.href='church-dashboard.html';}
async function doLogout(){await sb.auth.signOut();S.ready=false;S.pid='';S.pname='';render();}

function _render(){
  if(!S.ready){renderLogin();return;}
  var d=S.data,wk,M=S.members;
  for(var i=0;i<sundays.length;i++){if(sundays[i].k===S.week){wk=sundays[i];break;}}
  var ac=M.filter(function(m){return d[m.n]&&d[m.n].at;}).length;

  var att=M.filter(function(m){return d[m.n]&&d[m.n].at;}).map(function(m){return m.n;});

  h+='<div class="tabs" id="tabbar">';for(var i=0;i<sundays.length;i++){var s=sundays[i];h+='<button class="'+(s.k===S.week?'on':'')+'" onclick="setWeek(\''+s.k+'\')">'+s.l+'</button>';}h+='</div>';
  if(S.loading){h+='<div style="text-align:center;padding:40px;color:#8a8578">불러오는 중...</div><div class="ft"><button class="bp" disabled>로딩...</button></div>';document.getElementById('app').innerHTML=h;requestAnimationFrame(function(){var a=document.querySelector('.tabs .on');if(a)a.scrollIntoView({inline:'center',behavior:'auto'});});return;}
  h+='<div class="sum"><div><div class="n" id="s-ac">'+ac+'</div><div class="l">출석 / '+M.length+'</div></div><div class="dv"></div><div><div class="n" id="s-ts">'+ts.toLocaleString()+'</div><div class="l">총점</div></div></div>';
  h+='<div class="att-bar" id="s-att" style="display:'+(att.length>0?'block':'none')+'"><b>참석: </b>'+att.join(', ')+'</div>';
  h+='<div style="display:flex;justify-content:space-between;padding:0 16px 4px;font-size:10px"><span id="last-mod" style="color:#908caa;display:none"></span><span id="unsaved-badge" style="color:#e65100;font-weight:700;display:'+(S.unsaved?'inline':'none')+'">● 미저장</span></div>';
  h+='<div class="vtog"><button class="'+(S.view==='list'?'on':'')+'" onclick="setView(\'list\')">입력</button><button class="'+(S.view==='summary'?'on':'')+'" onclick="setView(\'summary\')">요약</button><button class="'+(S.view==='report'?'on':'')+'" onclick="setView(\'report\')">보고서</button></div>';
  if(S.view==='list'){
    h+='<div class="lh"><span>출석 체크 + 상세 입력</span><span>탭→펼치기</span></div>';
    M.forEach(function(m){var md=d[m.n]||empty(),sc_=score(md),fc=filled(md),o=S.expanded===m.n,en=esc(m.n);
      h+='<div class="mr'+(o?' open':'')+'"><div class="mc" onclick="toggle(\''+en+'\')">';
      h+='<div class="ck'+(md.at?' on':'')+'" id="ck-'+CSS.escape(m.n)+'" onclick="ckAt(\''+en+'\',event)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="#fff" stroke-width="3" stroke-linecap="round"/></svg></div>';
      h+='<div class="mn">'+m.n+(m.r!=='구역원'?'<span class="badge">'+m.r+'</span>':'')+'<small id="mi-'+CSS.escape(m.n)+'">'+(fc>0?fc+'개 항목 · '+sc_+'점':'')+'</small></div>';
      h+='<span class="sc" id="ms-'+CSS.escape(m.n)+'" style="display:'+(sc_>0?'':'none')+'">'+(sc_>0?sc_:'')+'</span>';
      h+='<svg class="arr" width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M6 9l6 6 6-6" stroke="#8a8578" stroke-width="2" stroke-linecap="round"/></svg></div><div class="dt">';
      GROUPS.forEach(function(g){var items=ITEMS.filter(function(it){return it.g===g.g && (!it.leaderOnly || m.r==='구역장');});if(items.length===0)return;h+='<div class="gh">'+g.l+'</div>';items.forEach(function(it){h+='<div class="ir"><div class="il">'+it.l+'<span>'+(it.t==='n'?it.u+'당 '+it.s+'점':it.s+'점')+'</span></div>';if(it.t==='c')h+='<button class="tb'+(md[it.k]?' on':'')+'" id="tb-'+CSS.escape(m.n)+'-'+it.k+'" onclick="ckItem(\''+en+'\',\''+it.k+'\')">'+(md[it.k]?'O':'X')+'</button>';else h+='<div class="nw"><button class="pm" onclick="numAdj(\''+en+'\',\''+it.k+'\',-1)">−</button><input class="ni" id="ni-'+CSS.escape(m.n)+'-'+it.k+'" type="number" inputmode="numeric" value="'+(md[it.k]||'')+'" placeholder="0" onchange="numSet(\''+en+'\',\''+it.k+'\',this.value)"><button class="pm" onclick="numAdj(\''+en+'\',\''+it.k+'\',1)">+</button></div>';h+='</div>';});});
      h+='<button class="del-btn" onclick="delMember(\''+en+'\')">🗑 '+m.n+' 삭제</button>';
      h+='</div></div>';});
    h+='<div class="add-area">'+(S.addingMember?'<div class="add-form"><input id="add-name" placeholder="이름" style="flex:2"><select id="add-role"><option value="구역원">구역원</option><option value="구역장">구역장</option><option value="권찰">권찰</option></select><button class="add-ok" onclick="addMember()">추가</button><button class="add-cancel" onclick="hideAdd()">취소</button></div>':'<button class="add-btn" onclick="showAdd()">+ 구역원 추가</button>')+'</div>';
  }
  if(S.view==='summary'){h+='<div class="sv" style="display:block">';var sumOrder=ITEMS.slice().sort(function(a,b){if(a.k==='at')return -1;if(b.k==='at')return 1;if(a.k==='fu')return -1;if(b.k==='fu')return 1;return 0;});sumOrder.forEach(function(it){var cnt=0,sum=0;M.forEach(function(m){var md=d[m.n]||empty();if(it.leaderOnly&&m.r!=='구역장')return;if(it.t==='c'&&md[it.k]){cnt++;sum+=it.s;}else if(it.t==='n'){var v=parseInt(md[it.k])||0;if(v>0){cnt++;var personSum=v*it.s;if(it.k==='br'&&personSum>30)personSum=30;if(it.k==='wb'&&personSum>390)personSum=390;sum+=personSum;}}});h+='<div class="sr"><div><div class="sn">'+it.l+(it.leaderOnly?' <span style="font-size:9px;color:#a09a8c">(구역장)</span>':'')+'</div><div class="sm">'+cnt+'명</div></div><div><div class="sv2">'+sum.toLocaleString()+'</div><div class="sv3">점</div></div></div>';});h+='<div class="sr total"><div class="sn" style="font-size:15px">합계</div><div class="sv2" style="font-size:20px">'+ts.toLocaleString()+'점</div></div></div>';}
  if(S.view==='report'){
    var fuItem=ITEMS.find(function(i){return i.k==='fu';});
    var cols=ITEMS.filter(function(i){return i.k!=='at' && i.k!=='fu';});
    var capMap={br:30,wb:390};
    h+='<div class="rpt"><table>';
    h+='<tr><th class="col-name">이름</th>';

(async function(){
