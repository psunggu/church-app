<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{font-family:'Apple SD Gothic Neo','Noto Sans KR',-apple-system,BlinkMacSystemFont,sans-serif;background:#f4f2ed;color:#1e2a1f;font-size:14px;-webkit-text-size-adjust:100%}
body{max-width:520px;margin:0 auto;padding-bottom:80px;min-height:100vh;min-height:100dvh}

/* 로그인 */
.login{min-height:100vh;min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:16px}
.login-c{background:#fff;border-radius:20px;padding:36px 24px 32px;max-width:360px;width:100%;box-shadow:0 4px 24px rgba(0,0,0,.06)}
.login-c h1{font-size:20px;font-weight:800;text-align:center;margin:8px 0 24px}
.login-c label{display:block;font-size:12px;font-weight:700;color:#6b6558;margin-bottom:4px}
.login-c input{width:100%;padding:13px 14px;border:2px solid #e0ddd4;border-radius:10px;font-size:15px;font-weight:600;outline:none;margin-bottom:14px;box-sizing:border-box;transition:border .15s}
.login-c input:focus{border-color:#3d5a3a}
.login-c .btn{width:100%;padding:14px;border:none;border-radius:12px;background:linear-gradient(135deg,#1e2a1f,#3d5a3a);color:#fff;font-size:16px;font-weight:700;cursor:pointer;margin-top:4px;transition:opacity .15s}
.login-c .btn:disabled{opacity:.5}
.login-c .err{color:#c0392b;font-size:12px;font-weight:600;text-align:center;margin-bottom:10px;display:none}

/* 체크리스트 */
.hd{background:linear-gradient(135deg,#1e2a1f,#3d5a3a);padding:20px 16px 14px;position:sticky;top:0;z-index:20;display:flex;justify-content:space-between;align-items:flex-start}
.hd h1{font-size:19px;font-weight:800;color:#e4dfcf}.hd p{font-size:12px;color:#9aab90;margin-top:2px}
.hd button{background:none;border:none;cursor:pointer;padding:4px}
.tabs{background:#fff;border-bottom:1px solid #e0ddd4;position:sticky;top:58px;z-index:19;display:flex;overflow-x:auto;padding:6px 8px;gap:3px;-webkit-overflow-scrolling:touch;scrollbar-width:none}.tabs::-webkit-scrollbar{display:none}
.tabs button{padding:6px 13px;border:none;border-radius:16px;background:transparent;color:#8a8578;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0}.tabs button.on{background:#1e2a1f;color:#fff}
.sum{padding:10px 16px 6px;display:flex;align-items:center;justify-content:center;gap:20px}
.sum .n{font-size:26px;font-weight:800;line-height:1}.sum .l{font-size:11px;color:#8a8578;font-weight:600;margin-top:2px;text-align:center}.sum .dv{width:1px;height:32px;background:#d4d0c6}
.att-bar{margin:0 16px 6px;background:#fff;border-radius:8px;padding:6px 10px;font-size:12px;line-height:1.5}.att-bar b{color:#8a8578;font-size:11px;font-weight:600}
.vtog{display:flex;margin:0 16px 8px;background:#e4e1d8;border-radius:10px;padding:3px}
.vtog button{flex:1;padding:7px 0;border:none;border-radius:8px;background:transparent;color:#8a8578;font-size:13px;font-weight:600;cursor:pointer}.vtog button.on{background:#fff;color:#1e2a1f;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.lh{display:flex;justify-content:space-between;padding:8px 16px 5px;font-size:11px;color:#a09a8c;border-bottom:1px solid #d8d5cc}
.mr{border-bottom:1px solid #eae7df}.mr:nth-child(odd){background:#fff}.mr:nth-child(even){background:#faf9f6}
.mc{display:flex;align-items:center;padding:10px 14px;cursor:pointer;gap:10px}
.ck{width:32px;height:32px;border-radius:8px;border:2px solid #c8c3b8;background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .12s}
.ck.on{background:#3d5a3a;border-color:#3d5a3a}.ck svg{display:none}.ck.on svg{display:block}
.mn{font-size:14px;font-weight:700;flex:1}.mn small{font-size:10px;color:#a09a8c;display:block;margin-top:1px}
.badge{font-size:9px;font-weight:700;padding:1px 5px;border-radius:4px;background:#dde8d8;color:#3d5a3a;margin-left:4px;vertical-align:middle}
.sc{font-size:13px;font-weight:800;color:#3d5a3a;min-width:24px;text-align:right}.arr{transition:transform .15s}
.dt{padding:0 14px 12px;background:#f0eee6;display:none}.mr.open .dt{display:block}.mr.open .arr{transform:rotate(180deg)}
.gh{font-size:12px;font-weight:700;color:#6b6558;padding:8px 0 4px;border-bottom:1px solid #d8d5cc}
.ir{display:flex;align-items:center;justify-content:space-between;padding:8px 0;gap:6px}
.il{flex:1;font-size:13px;font-weight:600}.il span{display:block;font-size:10px;color:#a09a8c;font-weight:400}
.tb{width:42px;height:32px;border-radius:8px;border:2px solid #c8c3b8;background:#fff;color:#8a8578;font-size:13px;font-weight:800;cursor:pointer;transition:all .12s}.tb.on{background:#3d5a3a;border-color:#3d5a3a;color:#fff}
.nw{display:flex;align-items:center;gap:2px}
.pm{width:28px;height:32px;border-radius:7px;border:1px solid #d4d0c6;background:#fff;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.ni{width:40px;height:32px;border:2px solid #e0ddd4;border-radius:7px;text-align:center;font-size:14px;font-weight:700;background:#fff;outline:none;-webkit-appearance:none;-moz-appearance:textfield}
.ni::-webkit-inner-spin-button,.ni::-webkit-outer-spin-button{-webkit-appearance:none}
.sv{padding:0 16px 12px}.sr{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:#fff;border-radius:10px;margin-top:5px}
.sr .sn{font-size:14px;font-weight:600}.sr .sm{font-size:11px;color:#8a8578}.sr .sv2{font-size:17px;font-weight:800;text-align:right}.sr .sv3{font-size:10px;color:#a09a8c}
.sr.total{background:#1e2a1f;margin-top:8px;border-radius:12px}.sr.total .sn,.sr.total .sv2{color:#e4dfcf}
.add-area{padding:12px 16px;border-top:2px dashed #d4d0c6;margin-top:4px}
.add-btn{width:100%;padding:12px;border:2px dashed #b8b3a6;border-radius:12px;background:transparent;color:#6b6558;font-size:14px;font-weight:600;cursor:pointer}
.add-form{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.add-form input{flex:1;min-width:100px;height:38px;border:2px solid #e0ddd4;border-radius:8px;padding:0 10px;font-size:14px;outline:none}
.add-form select{height:38px;border:2px solid #e0ddd4;border-radius:8px;padding:0 8px;font-size:13px;outline:none;background:#fff}
.add-form button{height:38px;padding:0 16px;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer}
.add-ok{background:#3d5a3a;color:#fff}.add-cancel{background:#e4e1d8;color:#6b6558}
.ft{position:fixed;bottom:0;left:0;right:0;padding:10px 16px;padding-bottom:max(10px,env(safe-area-inset-bottom));background:rgba(244,242,237,.95);-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);border-top:1px solid #d4d0c6;z-index:30;display:flex;gap:8px;justify-content:center}
.bp{flex:1;display:flex;align-items:center;justify-content:center;padding:12px 14px;border:none;border-radius:12px;background:linear-gradient(135deg,#1e2a1f,#3d5a3a);color:#fff;font-size:14px;font-weight:700;cursor:pointer}.bp:disabled{opacity:.5}
.toast{position:fixed;bottom:76px;left:50%;transform:translateX(-50%);padding:9px 20px;border-radius:18px;background:rgba(30,42,31,.92);color:#fff;font-size:13px;font-weight:600;z-index:40;white-space:nowrap;opacity:0;transition:opacity .2s}.toast.show{opacity:1}
</style>
<div id="app"></div>
<div id="toast" class="toast"></div>
<script>
// ═══ Supabase ═══
const SUPABASE_URL='https://ybpeyxzqzccfvcaveluh.supabase.co'; // ← Settings → API → Project URL
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlicGV5eHpxemNjZnZjYXZlbHVoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyMzA0MTksImV4cCI6MjA5MTgwNjQxOX0.RpsniUKYkfDCJmgKSL6jme3viKoIWxbvojReuEZuDgk'; // ← Settings → API → anon public key
const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

// ═══ 항목 정의 ═══
const ITEMS=[
  {k:'at',l:'출석',s:20,t:'c',g:0,c:'attendance'},
  {k:'br',l:'성경읽기',s:1,u:'장',t:'n',g:1,c:'bible_read'},
  {k:'bw',l:'성경쓰기',s:5,u:'쪽',t:'n',g:1,c:'bible_write'},
  {k:'bt',l:'성경타이핑',s:2,u:'쪽',t:'n',g:1,c:'bible_typing'},
  {k:'me',l:'암송',s:3,t:'c',g:2,c:'memorize'},
  {k:'ev',l:'전도',s:50,t:'c',g:2,c:'evangelism'},
  {k:'ds',l:'구역봉사',s:100,t:'c',g:3,c:'district_service'},
  {k:'ss',l:'주일/봉사팀 봉사',s:30,t:'c',g:3,c:'sunday_service'},
  {k:'nu',l:'양육',s:10,t:'c',g:2,c:'nurture'},
  {k:'mg',l:'양화진/순교자 안내',s:20,t:'c',g:3,c:'martyr_guide'},
  {k:'en',l:'환경보호점수',s:100,t:'c',g:4,c:'environment'},
  {k:'mp',l:'구역모임 장소',s:100,t:'c',g:4,c:'meeting_place'},
  {k:'wb',l:'겨울방학 성경읽기',s:1,u:'장',t:'n',g:4,c:'winter_bible'},
  {k:'bm',l:'성경 통독수련회',s:1189,t:'c',g:4,c:'bible_marathon'}
];
const GROUPS=[{l:'📖 성경',g:1},{l:'🙏 신앙생활',g:2},{l:'🤝 봉사',g:3},{l:'⭐ 특별항목',g:4}];

let sundays=[];
(function(){const now=new Date();for(let i=-12;i<=4;i++){const d=new Date(now);const day=d.getDay();d.setDate(d.getDate()-day+(day===0?0:7)+i*7);d.setHours(0,0,0,0);const m=d.getMonth()+1,dt=d.getDate();sundays.push({k:`${d.getFullYear()}-${String(m).padStart(2,'0')}-${String(dt).padStart(2,'0')}`,l:`${m}/${dt}`,ts:d.getTime()});}})();

// ═══ 상태 ═══
let S={pid:'',pname:'',role:'',week:'',data:{},members:[],expanded:null,view:'list',ready:false,loading:false,addingMember:false,unsaved:false,touched:new Set(),lastMod:null};
S.week=(()=>{let c=sundays[0],now=Date.now();for(const s of sundays)if(Math.abs(s.ts-now)<Math.abs(c.ts-now))c=s;return c.k;})();

function empty(){const d={};ITEMS.forEach(i=>d[i.k]=i.t==='c'?false:'');return d;}
function emptyAll(){const o={};S.members.forEach(m=>o[m.n]=empty());return o;}
function score(d){if(!d)return 0;let t=0;ITEMS.forEach(i=>{if(i.t==='c'&&d[i.k])t+=i.s;else if(i.t==='n')t+=(parseInt(d[i.k])||0)*i.s;});return t;}
function filled(d){if(!d)return 0;let c=0;ITEMS.forEach(i=>{if(i.t==='c'&&d[i.k])c++;else if(i.t==='n'&&parseInt(d[i.k])>0)c++;});return c;}
function hasFilled(d){return filled(d)>0;}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}
function esc(s){return s.replace(/'/g,"\\'");}

// ═══ Supabase 데이터 ═══
async function loadMembers(){
  const{data}=await sb.from('members').select('name,role').eq('parish_id',S.pid).order('created_at');
  if(data&&data.length>0)S.members=data.map(m=>({n:m.name,r:m.role}));
}
async function loadWeek(){
  S.loading=true;render();
  const{data}=await sb.from('reports').select('*').eq('report_date',S.week).eq('parish_id',S.pid);
  S.data=emptyAll();
  if(data&&data.length>0){
    data.forEach(r=>{
      if(!S.data[r.member_name])S.data[r.member_name]=empty();
      ITEMS.forEach(it=>{const v=r[it.c];if(it.t==='c')S.data[r.member_name][it.k]=(v==='O');else S.data[r.member_name][it.k]=v?String(v):'';});
    });
  }
  S.loading=false;render();
}
async function saveToDb(){
  const btn=document.getElementById('sync-btn');if(btn){btn.disabled=true;btn.textContent='저장 중...';}
  const targets=S.members.filter(m=>S.touched.has(m.n)||hasFilled(S.data[m.n]));
  if(!targets.length){toast('데이터 없음');if(btn){btn.disabled=false;btn.innerHTML=saveBtnHTML();}return;}
  const rows=targets.map(m=>{
    const md=S.data[m.n]||empty();
    const row={report_date:S.week,parish_id:S.pid,member_name:m.n,role:m.r,total_score:score(md),recorded_by:'앱',state:'Edit',recorded_at:new Date().toISOString()};
    ITEMS.forEach(it=>{row[it.c]=it.t==='c'?(md[it.k]?'O':'X'):(parseInt(md[it.k])||0);});return row;
  });
  const{error}=await sb.from('reports').upsert(rows,{onConflict:'report_date,parish_id,member_name'});
  if(!error){toast(`${rows.length}명 저장 완료 ✓`);S.unsaved=false;S.touched=new Set();const u=document.getElementById('unsaved-badge');if(u)u.style.display='none';}
  else toast('저장 실패: '+error.message);
  if(btn){btn.disabled=false;btn.innerHTML=saveBtnHTML();}
}
function saveBtnHTML(){return '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" style="margin-right:6px"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z" stroke="#fff" stroke-width="2"/><path d="M17 21v-8H7v8M7 3v5h8" stroke="#fff" stroke-width="2"/></svg>저장';}
async function addMember(){
  const ne=document.getElementById('add-name'),re=document.getElementById('add-role');if(!ne)return;
  const name=ne.value.trim(),role=re?re.value:'구역원';
  if(!name){toast('이름 입력');return;}if(S.members.some(m=>m.n===name)){toast('이미 등록');return;}
  const{error}=await sb.from('members').insert({parish_id:S.pid,name,role});
  if(!error){S.members.push({n:name,r:role});S.data[name]=empty();S.addingMember=false;toast(name+' 추가');render();}
}

// ═══ 부분 DOM 업데이트 ═══
function updateSummary(){const d=S.data,M=S.members,ac=M.filter(m=>d[m.n]?.at).length,ts=M.reduce((s,m)=>s+score(d[m.n]),0),att=M.filter(m=>d[m.n]?.at).map(m=>m.n);const a=document.getElementById('s-ac'),t=document.getElementById('s-ts'),at=document.getElementById('s-att');if(a)a.textContent=ac;if(t)t.textContent=ts.toLocaleString();if(at){at.innerHTML=att.length>0?'<b>참석: </b>'+att.join(', '):'';at.style.display=att.length>0?'block':'none';}}
function updateMI(n){const d=S.data[n]||empty(),sc_=score(d),fc=filled(d);const i=document.getElementById('mi-'+CSS.escape(n)),s=document.getElementById('ms-'+CSS.escape(n));if(i)i.innerHTML=fc>0?`${fc}개 항목 · ${sc_}점`:'';if(s){s.textContent=sc_>0?sc_:'';s.style.display=sc_>0?'':'none';}}
function markUnsaved(){S.unsaved=true;S.lastMod=new Date();const e=document.getElementById('last-mod');if(e){e.textContent='수정 '+S.lastMod.getHours()+':'+String(S.lastMod.getMinutes()).padStart(2,'0');e.style.display='inline';}const u=document.getElementById('unsaved-badge');if(u)u.style.display='inline';}

function ckAt(n,e){if(e)e.stopPropagation();if(!S.data[n])S.data[n]=empty();S.data[n].at=!S.data[n].at;S.touched.add(n);markUnsaved();const el=document.getElementById('ck-'+CSS.escape(n));if(el){if(S.data[n].at)el.classList.add('on');else el.classList.remove('on');}updateMI(n);updateSummary();}
function ckItem(n,k){if(!S.data[n])S.data[n]=empty();S.data[n][k]=!S.data[n][k];S.touched.add(n);markUnsaved();const el=document.getElementById('tb-'+CSS.escape(n)+'-'+k);if(el){if(S.data[n][k]){el.classList.add('on');el.textContent='O';}else{el.classList.remove('on');el.textContent='X';}}updateMI(n);updateSummary();}
function numAdj(n,k,d){if(!S.data[n])S.data[n]=empty();const v=Math.max(0,(parseInt(S.data[n][k])||0)+d);S.data[n][k]=String(v);S.touched.add(n);markUnsaved();const el=document.getElementById('ni-'+CSS.escape(n)+'-'+k);if(el)el.value=v;updateMI(n);updateSummary();}
function numSet(n,k,v){if(!S.data[n])S.data[n]=empty();S.data[n][k]=v;S.touched.add(n);markUnsaved();updateMI(n);updateSummary();}
function toggle(n){S.expanded=S.expanded===n?null:n;render();}
function setView(v){S.view=v;render();}
function showAdd(){S.addingMember=true;render();}
function hideAdd(){S.addingMember=false;render();}
async function setWeek(k){S.week=k;S.expanded=null;S.unsaved=false;S.touched=new Set();S.lastMod=null;await loadWeek();}
function render(){const sy=window.scrollY;_render();requestAnimationFrame(()=>window.scrollTo(0,sy));}

// ═══ 로그인 화면 ═══
function renderLogin(){
  document.getElementById('app').innerHTML=`<div class="login"><div class="login-c">
    <div style="font-size:42px;text-align:center">⛪</div>
    <h1>구역보고서</h1>
    <div class="err" id="login-err"></div>
    <label for="login-id">아이디</label>
    <input id="login-id" type="text" placeholder="교구번호 또는 admin" autocomplete="username" autocapitalize="off" spellcheck="false">
    <label for="login-pw">비밀번호</label>
    <input id="login-pw" type="password" placeholder="비밀번호" autocomplete="current-password">
    <button class="btn" id="login-btn" onclick="doLogin()">로그인</button>
  </div></div>`;
  document.getElementById('login-id')?.focus();
  document.getElementById('login-pw')?.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
  document.getElementById('login-id')?.addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('login-pw')?.focus();});
}

async function doLogin(){
  const idEl=document.getElementById('login-id'),pwEl=document.getElementById('login-pw');
  const errEl=document.getElementById('login-err'),btn=document.getElementById('login-btn');
  const uid=(idEl?idEl.value.trim():''),pw=(pwEl?pwEl.value:'');
  if(!uid||!pw){if(error){if(errEl){errEl.textContent=error.message+' | '+email+' | '+pw;errEl.style.display='block';}return;}
  if(btn){btn.disabled=true;btn.textContent='로그인 중...';}
  if(errEl)errEl.style.display='none';

  // ID → 내부 이메일 변환 (사용자에게 보이지 않음)
  const email=(uid==='admin')?'admin@c41.app':`u${uid}@c41.app`;
  const{data,error}=await sb.auth.signInWithPassword({email,password:pw});

  if(error){
    if(errEl){errEl.textContent='아이디 또는 비밀번호가 올바르지 않습니다';errEl.style.display='block';}
    if(btn){btn.disabled=false;btn.textContent='로그인';}return;
  }
  await onAuth(data.user);
}

async function onAuth(user){
  const meta=user.user_metadata||{};
  S.pid=meta.parish_id||'';S.pname=meta.name||'';S.role=meta.role||'parish';
  // admin → 대시보드로 이동
  if(S.role==='admin'){window.location.href='church-dashboard.html';return;}
  // parish → 체크리스트
  S.ready=true;await loadMembers();await loadWeek();
}

async function doLogout(){await sb.auth.signOut();S.ready=false;S.pid='';S.pname='';render();}

// ═══ 체크리스트 렌더 ═══
function _render(){
  if(!S.ready){renderLogin();return;}
  const d=S.data,wk=sundays.find(s=>s.k===S.week),M=S.members;
  const ac=M.filter(m=>d[m.n]?.at).length,ts=M.reduce((s,m)=>s+score(d[m.n]),0),att=M.filter(m=>d[m.n]?.at).map(m=>m.n);
  let h=`<div class="hd"><div><h1>${S.pname}</h1><p>${wk?.l||''} 주일</p></div><button onclick="doLogout()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#b8b3a6" stroke-width="1.5"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg></button></div>`;
  h+=`<div class="tabs" id="tabbar">`;sundays.forEach(s=>{h+=`<button class="${s.k===S.week?'on':''}" onclick="setWeek('${s.k}')">${s.l}</button>`;});h+=`</div>`;
  if(S.loading){h+=`<div style="text-align:center;padding:40px;color:#8a8578">불러오는 중...</div><div class="ft"><button class="bp" disabled>로딩...</button></div>`;document.getElementById('app').innerHTML=h;requestAnimationFrame(()=>{const a=document.querySelector('.tabs .on');if(a)a.scrollIntoView({inline:'center',behavior:'auto'});});return;}
  h+=`<div class="sum"><div><div class="n" id="s-ac">${ac}</div><div class="l">출석 / ${M.length}</div></div><div class="dv"></div><div><div class="n" id="s-ts">${ts.toLocaleString()}</div><div class="l">총점</div></div></div>`;
  h+=`<div class="att-bar" id="s-att" style="display:${att.length>0?'block':'none'}"><b>참석: </b>${att.join(', ')}</div>`;
  h+=`<div style="display:flex;justify-content:space-between;padding:0 16px 4px;font-size:10px"><span id="last-mod" style="color:#908caa;display:none"></span><span id="unsaved-badge" style="color:#e65100;font-weight:700;display:${S.unsaved?'inline':'none'}">● 미저장</span></div>`;
  h+=`<div class="vtog"><button class="${S.view==='list'?'on':''}" onclick="setView('list')">입력</button><button class="${S.view==='summary'?'on':''}" onclick="setView('summary')">요약</button></div>`;
  if(S.view==='list'){
    h+=`<div class="lh"><span>출석 체크 + 상세 입력</span><span>탭→펼치기</span></div>`;
    M.forEach(m=>{const md=d[m.n]||empty(),sc_=score(md),fc=filled(md),o=S.expanded===m.n,en=esc(m.n);
      h+=`<div class="mr${o?' open':''}"><div class="mc" onclick="toggle('${en}')"><div class="ck${md.at?' on':''}" id="ck-${CSS.escape(m.n)}" onclick="ckAt('${en}',event)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="#fff" stroke-width="3" stroke-linecap="round"/></svg></div><div class="mn">${m.n}${m.r!=='구역원'?`<span class="badge">${m.r}</span>`:''}<small id="mi-${CSS.escape(m.n)}">${fc>0?`${fc}개 항목 · ${sc_}점`:''}</small></div><span class="sc" id="ms-${CSS.escape(m.n)}" style="display:${sc_>0?'':'none'}">${sc_>0?sc_:''}</span><svg class="arr" width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M6 9l6 6 6-6" stroke="#8a8578" stroke-width="2" stroke-linecap="round"/></svg></div><div class="dt">`;
      GROUPS.forEach(g=>{const items=ITEMS.filter(it=>it.g===g.g);h+=`<div class="gh">${g.l}</div>`;items.forEach(it=>{h+=`<div class="ir"><div class="il">${it.l}<span>${it.t==='n'?`${it.u}당 ${it.s}점`:`${it.s}점`}</span></div>`;if(it.t==='c')h+=`<button class="tb${md[it.k]?' on':''}" id="tb-${CSS.escape(m.n)}-${it.k}" onclick="ckItem('${en}','${it.k}')">${md[it.k]?'O':'X'}</button>`;else h+=`<div class="nw"><button class="pm" onclick="numAdj('${en}','${it.k}',-1)">−</button><input class="ni" id="ni-${CSS.escape(m.n)}-${it.k}" type="number" inputmode="numeric" value="${md[it.k]||''}" placeholder="0" onchange="numSet('${en}','${it.k}',this.value)"><button class="pm" onclick="numAdj('${en}','${it.k}',1)">+</button></div>`;h+=`</div>`;});});
      h+=`</div></div>`;});
    h+=`<div class="add-area">${S.addingMember?`<div class="add-form"><input id="add-name" placeholder="이름" style="flex:2"><select id="add-role"><option value="구역원">구역원</option><option value="구역장">구역장</option><option value="권찰">권찰</option></select><button class="add-ok" onclick="addMember()">추가</button><button class="add-cancel" onclick="hideAdd()">취소</button></div>`:`<button class="add-btn" onclick="showAdd()">+ 구역원 추가</button>`}</div>`;
  }
  if(S.view==='summary'){h+=`<div class="sv" style="display:block">`;ITEMS.forEach(it=>{let cnt=0,sum=0;M.forEach(m=>{const md=d[m.n]||empty();if(it.t==='c'&&md[it.k]){cnt++;sum+=it.s;}else if(it.t==='n'){const v=parseInt(md[it.k])||0;if(v>0){cnt++;sum+=v*it.s;}}});h+=`<div class="sr"><div><div class="sn">${it.l}</div><div class="sm">${cnt}명</div></div><div><div class="sv2">${sum.toLocaleString()}</div><div class="sv3">점</div></div></div>`;});h+=`<div class="sr total"><div class="sn" style="font-size:15px">합계</div><div class="sv2" style="font-size:20px">${ts.toLocaleString()}점</div></div></div>`;}
  h+=`<div class="ft"><button class="bp" id="sync-btn" onclick="saveToDb()">${saveBtnHTML()}</button></div>`;
  document.getElementById('app').innerHTML=h;
  requestAnimationFrame(()=>{const a=document.querySelector('.tabs .on');if(a)a.scrollIntoView({inline:'center',behavior:'auto'});});
}

// ═══ INIT (세션 있으면 자동 로그인) ═══
(async function(){
  document.getElementById('app').innerHTML='<div style="min-height:100vh;display:flex;align-items:center;justify-content:center"><div style="font-size:12px;color:#908caa">불러오는 중...</div></div>';
  const{data:{session}}=await sb.auth.getSession();
  if(session)await onAuth(session.user);
  else renderLogin();
})();
</script>
