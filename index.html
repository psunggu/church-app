// ═══ 공통: 스토리지 ═══
const HAS_CLOUD=typeof window.storage!=='undefined'&&window.storage&&typeof window.storage.get==='function';
async function sget(k){
  if(HAS_CLOUD){try{const r=await window.storage.get(k);if(r&&r.value!==undefined&&r.value!==null)return r.value;return null;}catch{}}
  try{return localStorage.getItem(k);}catch{return null;}
}
async function sset(k,v){
  let ok=false;
  if(HAS_CLOUD){try{const r=await window.storage.set(k,v);ok=!!r;}catch{}}
  try{localStorage.setItem(k,v);ok=true;}catch{}
  return ok;
}
async function sdel(k){
  if(HAS_CLOUD){try{await window.storage.delete(k);}catch{}}
  try{localStorage.removeItem(k);}catch{}
}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}

let gatewayUrl='';
async function getGateway(){
  if(GATEWAY_URL&&GATEWAY_URL.length>10)return GATEWAY_URL;
  if(gatewayUrl&&gatewayUrl.length>10)return gatewayUrl;
  const saved=await sget('ch:gateway');
  if(saved&&saved.length>10){gatewayUrl=saved;return saved;}
  return null;
}

async function doAuth(){
  const el=document.getElementById('access-code');
  const errEl=document.getElementById('auth-error');
  const btn=document.getElementById('auth-btn');
  if(!el)return;
  const code=el.value.trim();
  if(!code){if(errEl){errEl.textContent='접속코드를 입력해주세요';errEl.style.display='block';}return;}

  const gw=await getGateway();
  if(!gw){if(errEl){errEl.textContent='게이트웨이 URL을 먼저 설정해주세요';errEl.style.display='block';}return;}

  if(btn){btn.disabled=true;btn.textContent='인증 중...';}
  if(errEl)errEl.style.display='none';

  try{
    const res=await fetch(gw+'?action=auth&code='+encodeURIComponent(code),{redirect:'follow'});
    const text=await res.text();
    if(text.startsWith('<'))throw new Error('HTML응답');
    const json=JSON.parse(text);

    if(json.status==='ok'){
      await sset('ch:gateway',gw);
      gatewayUrl=gw;

      const pName=json.parish_name||'';
      const isAdmin=pName.includes('통합')||code==='admin41';

      if(isAdmin){
        // ─── 대시보드 모드 ───
        APP_MODE='dashboard';
        S.url=gw;
        await sset(DK,gw);
        await sset('app:mode','dashboard');
        applyCSS('dashboard');
        toast('관리자 접속 성공!');
        S.showSetup=false;
        render();
      }else{
        // ─── 체크리스트 모드 ───
        APP_MODE='checklist';
        if(json.script_url&&json.script_url.length>10){
          state.url=json.script_url;
          await sset(UK,json.script_url);
        }
        await sset(DK,gw);
        await sset('app:mode','checklist');
        await sset('app:parish',pName);
        applyCSS('checklist');
        toast('접속 성공! '+pName);
        state.ready=true;
        await loadMembers();
        await loadWeek();
      }
      return;
    }else{
      if(errEl){errEl.textContent=json.message||'인증 실패';errEl.style.display='block';}
    }
  }catch(e){
    if(errEl){errEl.textContent='서버 연결 실패 — '+e.message;errEl.style.display='block';}
  }
  if(btn){btn.disabled=false;btn.textContent='접속';}
}

async function logout(){

  await sset('app:mode','');
  state.url='';state.ready=false;
  S.url='';S.showSetup=false;
  await sset(UK,'');await sset(DK,'');

  renderAuth();
}

async function loadWeek(){

  if(state.url){
    // ─── 시트 조회 (최대 2회 시도) ───
    let result=null;
    for(let attempt=0;attempt<2;attempt++){
      result=await fetchFromSheet(state.week);
      if(result.connected)break;
      // 1회 실패 시 0.5초 대기 후 재시도
      if(attempt===0)await new Promise(r=>setTimeout(r,500));
    }

    if(result&&result.connected){
      if(result.data){
        state.data=result.data;
        state.dataSource='sheet';
        await sset(SK(state.week),JSON.stringify(state.data));
        await markWeekSaved(state.week);
      }else{
        state.data=emptyAll();
        state.dataSource='empty';
        await sset(SK(state.week),'');
      }
      state.loading=false;
      clRender();
      return;
    }

    // 시트 연결 실패 로그
    state._sheetError=result?result.error:'unknown';
    console.log('Sheet connection failed:',state._sheetError);
  }

  // ─── 시트 연결 실패 → 로컬 캐시 (오프라인 백업) ───
  try{
    const raw=await sget(SK(state.week));

      state.data={...emptyAll(),...localData};

      state.dataSource='local';

      clRender();

}

// ═══ 시트에서 데이터 가져오기 (타임아웃 + 에러 처리 강화) ═══
async function fetchFromSheet(weekKey){
  if(!state.url)return {connected:false,data:null,error:'URL없음'};
  try{
    const url=state.url+'?action=read&date='+encodeURIComponent(weekKey)+'&parish='+P_ID;

    // 10초 타임아웃
    const controller=new AbortController();
    const timeout=setTimeout(()=>controller.abort(),10000);

    const res=await fetch(url,{
      redirect:'follow',
      signal:controller.signal
    });
    clearTimeout(timeout);

    const text=await res.text();

    // HTML 응답 = Apps Script 인증/배포 문제
    if(text.startsWith('<')||text.startsWith('!')){
      return {connected:false,data:null,error:'HTML응답(재배포필요)'};
    }

    // 빈 응답
    if(!text||text.trim().length===0){
      return {connected:false,data:null,error:'빈응답'};
    }

    const json=JSON.parse(text);

    // rows 필드 존재 확인 (정상 응답)
    if(!json.hasOwnProperty('rows')){
      return {connected:false,data:null,error:'rows필드없음:'+text.substring(0,100)};
    }

    // 데이터 있음
    if(json.rows.length>0){
      const loaded=emptyAll();
      json.rows.forEach(r=>{
        const name=r.member_name;
        if(!loaded[name])loaded[name]=empty();
        Object.entries(MAP_FROM_SHEET).forEach(([sheetKey,appKey])=>{
          const item=ITEMS.find(i=>i.k===appKey);if(!item)return;
          const val=r[sheetKey];
          if(item.t==='c')loaded[name][appKey]=(val==='O'||val===true);
          else if(item.t==='n')loaded[name][appKey]=val?String(val):'';
        });
      });
      return {connected:true,data:loaded,error:null};
    }

    // 연결 성공, 데이터 0건
    return {connected:true,data:null,error:null};

  }catch(e){
    return {connected:false,data:null,error:e.name==='AbortError'?'타임아웃(10초)':e.message};
  }
}

function syncBtnHTML(){return '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" style="margin-right:6px"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>저장';}

async function syncSheet(){
  if(!state.url)return toast('URL이 없습니다');
  const btn=document.getElementById('sync-btn');
  if(btn){btn.disabled=true;btn.textContent='저장 중...';}
  const d=state.data;

  const targets=state.members.filter(m=>state.touched.has(m.n)||hasFilled(d[m.n]));
  const rows=targets.map(m=>{
    const md=d[m.n]||empty();
    const r={report_date:state.week,parish_id:P_ID,member_name:m.n,role:m.r,total_score:score(md),recorded_by:'모바일앱'};
    ITEMS.forEach(it=>{const key=MAP_TO_SHEET[it.k];if(it.t==='c')r[key]=md[it.k]?'O':'X';else if(it.t==='n')r[key]=parseInt(md[it.k])||0;});
    return r;
  });
  if(rows.length===0){toast('입력된 데이터가 없습니다');if(btn){btn.disabled=false;btn.innerHTML=syncBtnHTML();}return;}

  const payload=JSON.stringify({action:'sync',rows});
  let success=false;
  let lastError='';

  // 최대 2회 시도
  for(let attempt=0;attempt<2;attempt++){
    try{
      const controller=new AbortController();
      const tid=setTimeout(()=>controller.abort(),10000);

      // Google Apps Script POST (redirect:'follow'로 302 처리)
      const res=await fetch(state.url,{
        method:'POST',
        redirect:'follow',
        signal:controller.signal,
        headers:{'Content-Type':'text/plain;charset=utf-8'},
        body:payload
      });
      clearTimeout(tid);

      // 응답 처리 (다양한 케이스 대응)
      if(res.ok||res.status===200||res.type==='opaque'||res.redirected){
        try{
          const text=await res.text();
          if(text&&!text.startsWith('<')){
            const json=JSON.parse(text);
            if(json.status==='ok'||json.inserted!==undefined||json.edited!==undefined){
              success=true;break;
            }
          }
          // POST는 성공했지만 GET 리다이렉트 결과가 이상한 경우
          // → ping으로 연결 확인하여 성공 여부 판별
          const verify=await fetch(state.url+'?action=ping',{redirect:'follow'});
          const vText=await verify.text();
          if(!vText.startsWith('<')){success=true;break;}
        }catch(parseErr){
          // 파싱 실패지만 fetch 자체는 성공 → 저장 성공으로 간주
          success=true;break;
        }
      }else{
        lastError='HTTP '+res.status;
      }
    }catch(e){
      lastError=e.name==='AbortError'?'타임아웃(10초)':e.message;
      if(attempt===0)await new Promise(r=>setTimeout(r,500));
    }
  }

  if(success){
    // 41교구 통합 시트에도 저장 (실패 무시)
    const dashUrl=await sget('dash41:url');
    if(dashUrl&&dashUrl.length>10){
      try{await fetch(dashUrl,{method:'POST',redirect:'follow',
        headers:{'Content-Type':'text/plain;charset=utf-8'},body:payload});}catch(e){}
    }

    toast(`${rows.length}명 저장 완료! ✓`);
    state.unsaved=false;
    state.touched=new Set();
    state.dataSource='sheet';
    state._sheetError=null;
    const uel=document.getElementById('unsaved-badge');
    if(uel)uel.style.display='none';
    await sset(SK(state.week),JSON.stringify(state.data));
    await markWeekSaved(state.week);
  }else{
    toast('저장 실패: '+lastError);
  }
  if(btn){btn.disabled=false;btn.innerHTML=syncBtnHTML();}
}

function exportCSV(){
  const d=state.data,hd='날짜,교구,이름,역할,출석,성경읽기,성경쓰기,성경타이핑,암송,전도,구역봉사,주일봉사,양육,양화진안내,환경보호,구역모임장소,겨울방학성경읽기,성경통독수련회,총점';
  const rows=state.members.filter(m=>hasFilled(d[m.n])).map(m=>{const md=d[m.n]||empty();return [state.week,P_ID,m.n,m.r,md.at?'O':'X',md.br||0,md.bw||0,md.bt||0,md.me?'O':'X',md.ev?'O':'X',md.ds?'O':'X',md.ss?'O':'X',md.nu?'O':'X',md.mg?'O':'X',md.en?'O':'X',md.mp?'O':'X',md.wb||0,md.bm?'O':'X',score(md)].join(',');});
  if(rows.length===0){toast('입력된 데이터가 없습니다');return;}
  const csv='\uFEFF'+[hd,...rows].join('\n');const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));a.download=`${P_LABEL}_${state.week}.csv`;a.click();toast('CSV 다운로드 완료!');
}

async function authWithCode(){
  const el=document.getElementById('access-code');
  const errEl=document.getElementById('auth-error');
  const btn=document.getElementById('auth-btn');
  if(!el)return;
  const code=el.value.trim();
  if(!code){if(errEl){errEl.textContent='접속코드를 입력해주세요';errEl.style.display='block';}return;}

  const gw=await getGateway();
  if(!gw){
    if(errEl){errEl.textContent='게이트웨이 URL이 설정되지 않았습니다';errEl.style.display='block';}
    return;
  }

  if(btn){btn.disabled=true;btn.textContent='인증 중...';}
  if(errEl)errEl.style.display='none';

  try{
    const res=await fetch(gw+'?action=auth&code='+encodeURIComponent(code),{redirect:'follow'});
    const text=await res.text();
    if(text.startsWith('<'))throw new Error('연결 실패');
    const json=JSON.parse(text);

    if(json.status==='ok'&&json.script_url&&json.script_url.length>10){
      state.url=json.script_url;
      await sset(UK,json.script_url);
      await sset('dash41:url',gw);
      await sset('ch:gateway',gw);
      state.gatewayUrl=gw;
      toast('접속 성공! '+json.parish_name);
      state.ready=true;
      await loadMembers();
      await loadWeek();
      return;
    }else{
      if(errEl){errEl.textContent=json.message||'인증 실패';errEl.style.display='block';}
    }
  }catch(e){
    if(errEl){errEl.textContent='서버 연결 실패 — URL을 확인해주세요';errEl.style.display='block';}
  }
  if(btn){btn.disabled=false;btn.textContent='접속';}
}

function calc(){
  if(!S.data)return null;
  const r={};
  PARISHES.forEach(p=>{
    r[p]={n:0,leader:'',lAtt:0,lBible:0,items:{},total:0,att:[]};
    COLS.forEach(c=>{r[p].items[c.k]={cnt:0,sum:0,sc:0};});
  });
  S.data.forEach(row=>{
    const pid=String(row.parish_id);if(!r[pid])return;
    r[pid].n++;
    if(row.role==='구역장'){r[pid].leader=row.member_name;if(row.attendance==='O'||row.attendance===true)r[pid].lAtt=1;r[pid].lBible=parseInt(row.bible_read)||0;}
    if(row.attendance==='O'||row.attendance===true)r[pid].att.push(row.member_name);
    COLS.forEach(c=>{
      const v=row[c.k];
      if(c.t==='c'){if(v==='O'||v===true){r[pid].items[c.k].cnt++;r[pid].items[c.k].sc+=c.p;}}
      else{const n=parseInt(v)||0;if(n>0){r[pid].items[c.k].cnt++;r[pid].items[c.k].sum+=n;r[pid].items[c.k].sc+=n*c.p;}}
    });
  });
  PARISHES.forEach(p=>{COLS.forEach(c=>{r[p].total+=r[p].items[c.k].sc;});});
  return r;
}

      }
    });
    h+=`<td class="sc">${d.total>0?d.total.toLocaleString():''}</td><td class="att">${d.att.join(', ')}</td></tr>`;
  });

  h+=`<tr class="tr"><td class="nm">합계</td><td>${PARISHES.filter(p=>ag[p].leader).length}</td>`;
  h+=`<td>${PARISHES.reduce((s,p)=>s+ag[p].lAtt,0)}</td><td>${PARISHES.reduce((s,p)=>s+ag[p].lBible,0)}</td><td></td>`;
  COLS.forEach(c=>{let tc=0,ts=0,tsc=0;PARISHES.forEach(p=>{const it=ag[p].items[c.k];tc+=it.cnt;ts+=it.sum;tsc+=it.sc;});h+=c.t==='n'?`<td>${ts}</td><td>${tsc.toLocaleString()}</td>`:`<td>${tc}</td><td>${tsc.toLocaleString()}</td>`;});
  h+=`<td class="sc">${tScore.toLocaleString()}</td><td></td></tr></table></div>`;

  // 순위
  const sorted=[...PARISHES].sort((a,b)=>ag[b].total-ag[a].total);
  const mx=sorted.length?ag[sorted[0]].total:1;
  const cl=['#1a237e','#283593','#303f9f','#3949ab','#3f51b5','#5c6bc0','#7986cb','#9fa8da','#c5cae9','#d1c4e9','#e8eaf6'];
  h+=`<div class="bs"><div class="bs-t">총점 순위</div>`;
  sorted.forEach((p,i)=>{const sc=ag[p].total,pct=mx>0?Math.round(sc/mx*100):0;h+=`<div class="br"><span class="br-l">${p}</span><div class="br-bg"><div class="br-f" style="width:${pct}%;background:${cl[i]}"></div></div><span class="br-v">${sc.toLocaleString()}</span></div>`;});
  h+=`</div>`;

  document.getElementById('app').innerHTML=h;
  requestAnimationFrame(()=>{const a=document.querySelector('.tabs .on');if(a)a.scrollIntoView({inline:'center',behavior:'auto'});});
}

async function saveDashGateway(){
  const el=document.getElementById('dgw-input');
  const u=el?el.value.trim():'';
  if(!u){toast('URL을 입력해주세요');return;}
  S.gatewayUrl=u;
  await sset('ch:gateway',u);
  toast('게이트웨이 저장 완료!');
  dbRender();
}

async function getDashGateway(){
  if(GATEWAY_URL&&GATEWAY_URL.length>10)return GATEWAY_URL;
  if(S.gatewayUrl&&S.gatewayUrl.length>10)return S.gatewayUrl;
  const saved=await sget('ch:gateway');
  if(saved&&saved.length>10){S.gatewayUrl=saved;return saved;}
  return null;
}

async function dashAuth(){
  const el=document.getElementById('dash-code');
  const errEl=document.getElementById('dash-error');
  const btn=document.getElementById('dash-auth-btn');
  if(!el)return;
  const code=el.value.trim();
  if(!code){if(errEl){errEl.textContent='접속코드를 입력해주세요';errEl.style.display='block';}return;}

  const gw=await getDashGateway();
  if(!gw){if(errEl){errEl.textContent='게이트웨이 URL이 설정되지 않았습니다';errEl.style.display='block';}return;}

  if(btn){btn.disabled=true;btn.textContent='인증 중...';}
  if(errEl)errEl.style.display='none';

  try{
    const res=await fetch(gw+'?action=auth&code='+encodeURIComponent(code),{redirect:'follow'});
    const text=await res.text();
    if(text.startsWith('<'))throw new Error('연결 실패');
    const json=JSON.parse(text);
    if(json.status==='ok'){
      // admin41 코드 → 게이트웨이 자체가 대시보드 URL
      S.url=gw;
      await sset(DK,gw);
      await sset('ch:gateway',gw);
      S.gatewayUrl=gw;
      toast('접속 성공! '+(json.parish_name||''));
      S.showSetup=false;dbRender();return;
    }else{if(errEl){errEl.textContent=json.message||'인증 실패';errEl.style.display='block';}}
  }catch(e){if(errEl){errEl.textContent='서버 연결 실패 — URL을 확인해주세요';errEl.style.display='block';}}
  if(btn){btn.disabled=false;btn.textContent='접속';}
}

async function clearDashUrl(){S.url='';await sset(DK,'');toast('연결 해제됨');S.showSetup=false;dbRender();}

  document.getElementById('app').innerHTML='<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px"><div style="font-size:38px">⛪</div><div style="font-size:16px;font-weight:700;color:#1e2a1f">41교구 구역보고서</div><div style="font-size:12px;color:#908caa">불러오는 중...</div></div>';

  // 게이트웨이 로드
  const savedGw=await sget('ch:gateway');
  if(savedGw&&savedGw.length>10)gatewayUrl=savedGw;
  else if(GATEWAY_URL&&GATEWAY_URL.length>10){gatewayUrl=GATEWAY_URL;await sset('ch:gateway',GATEWAY_URL);}

  // 저장된 모드 확인
  const savedMode=await sget('app:mode');

  if(savedMode==='checklist'){

    if(url&&url.length>10){
      APP_MODE='checklist';
      state.url=url;
      state.ready=true;
      applyCSS('checklist');
      // 로컬 캐시 초기화 (시트 = 진실의 원천)
      await sset(SK(state.week),'');
      state.savedWeeks={};await sset(WK,'{}');
      await loadMembers();
      await loadWeek();
      return;
    }
  }

  if(savedMode==='dashboard'){
    const url=await sget(DK);
    if(url&&url.length>10){
      APP_MODE='dashboard';
      S.url=url;
      S.showSetup=false;
      applyCSS('dashboard');
      render();
      return;
    }
  }

  // 저장된 모드 없음 → 인증 화면
  renderAuth();
})();
