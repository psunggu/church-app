<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">

<title>구역보고서</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{font-family:'Apple SD Gothic Neo','Noto Sans KR',-apple-system,BlinkMacSystemFont,sans-serif;background:#f0eff8;color:#1a1a2e;font-size:14px;-webkit-text-size-adjust:100%}
body{margin:0;padding-bottom:20px;min-height:100vh}
.login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
.login-c{background:#fff;border-radius:20px;padding:36px 24px 32px;max-width:360px;width:100%;box-shadow:0 4px 24px rgba(0,0,0,.06)}
.login-c h1{font-size:20px;font-weight:800;text-align:center;margin:8px 0 24px}
.login-c label{display:block;font-size:12px;font-weight:700;color:#6b6558;margin-bottom:4px}
.login-c input{width:100%;padding:13px 14px;border:2px solid #ddd8ef;border-radius:10px;font-size:15px;font-weight:600;outline:none;margin-bottom:14px;box-sizing:border-box}
.login-c input:focus{border-color:#1a1a2e}
.login-c .btn{width:100%;padding:14px;border:none;border-radius:12px;background:linear-gradient(135deg,#1a1a2e,#16213e);color:#fff;font-size:16px;font-weight:700;cursor:pointer;margin-top:4px}.login-c .btn:disabled{opacity:.5}
.login-c .err{color:#c0392b;font-size:12px;font-weight:600;text-align:center;margin-bottom:10px;display:none}
.hd{background:linear-gradient(135deg,#1a1a2e,#16213e);padding:16px 14px 12px;position:sticky;top:0;z-index:20;display:flex;justify-content:space-between;align-items:flex-start}
.hd h1{font-size:15px;font-weight:800;color:#e0def4}.hd p{font-size:10px;color:#908caa;margin-top:2px}
.hd button{background:none;border:none;cursor:pointer;padding:4px}
.tabs{background:#fff;border-bottom:1px solid #ddd8ef;position:sticky;top:48px;z-index:19;display:flex;overflow-x:auto;padding:4px 6px;gap:2px;scrollbar-width:none}.tabs::-webkit-scrollbar{display:none}
.tabs button{padding:5px 10px;border:none;border-radius:12px;background:transparent;color:#908caa;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0}.tabs button.on{background:#1a1a2e;color:#fff}
.ctrl{padding:8px 12px;display:flex;gap:6px;align-items:center}
.ctrl button{padding:8px 14px;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer}.ctrl .c1{background:linear-gradient(135deg,#1a237e,#283593);color:#fff}.ctrl button:disabled{opacity:.5}.ctrl .info{font-size:10px;color:#908caa}
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:0 12px 8px}
.cd{background:#fff;border-radius:8px;padding:8px;text-align:center;border:1px solid #ece9f5}.cd .v{font-size:18px;font-weight:800;line-height:1}.cd .l{font-size:9px;color:#908caa;font-weight:600;margin-top:2px}
.tw{overflow-x:auto;-webkit-overflow-scrolling:touch;padding:0 4px 8px}
table.rt{border-collapse:collapse;font-size:10px;width:max-content;min-width:100%}
table.rt th{background:#2c3e6b;color:#e8eaf6;font-weight:700;padding:4px;white-space:nowrap;border:1px solid #1a2750;text-align:center;line-height:1.2}
table.rt th.y{background:#f9a825;color:#1a1a2e}.rt th.sub{background:#3d5274;font-weight:400;font-size:8px;color:#b0bec5}
table.rt td{padding:3px 4px;text-align:center;border:1px solid #ddd8ef;white-space:nowrap;font-size:10px}
table.rt td.nm{position:sticky;left:0;background:inherit;text-align:left;font-weight:700;font-size:11px;z-index:1;min-width:50px}
table.rt tr:nth-child(odd){background:#fff}table.rt tr:nth-child(even){background:#f5f4fa}
.rt .v{color:#1565c0;font-weight:700}.rt .z{color:#d0d0d0}
.rt .sc{background:rgba(26,26,46,.05);font-weight:800;font-size:11px}.rt .tr{background:#e8eaf6!important}.rt .tr td{border-top:2px solid #1a1a2e;font-weight:800}
.rt .att{text-align:left;font-size:8px;color:#555;max-width:160px;white-space:normal;line-height:1.2}
.bs{padding:8px 12px}.bs-t{font-size:12px;font-weight:700;margin-bottom:6px}
.br{display:flex;align-items:center;gap:5px;margin-bottom:3px}.br-l{min-width:42px;font-size:10px;font-weight:700}.br-bg{flex:1;height:16px;background:#e8eaf6;border-radius:4px;overflow:hidden}.br-f{height:100%;border-radius:4px;transition:width .4s}.br-v{min-width:44px;text-align:right;font-size:10px;font-weight:800}
.msg{text-align:center;padding:24px 16px;color:#908caa;font-size:12px}
.toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);padding:8px 18px;border-radius:16px;background:rgba(26,26,46,.92);color:#fff;font-size:12px;font-weight:600;z-index:40;white-space:nowrap;opacity:0;transition:opacity .2s}.toast.show{opacity:1}
</style>
<div id="app"></div>
<div id="toast" class="toast"></div>
<script>
// ══════════════════════════════════════
// ★ Supabase 설정 — 아래 두 줄만 수정 ★
// ══════════════════════════════════════
var SB_URL = 'https://ybpeyxzqzccfvcaveluh.supabase.co';
var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlicGV5eHpxemNjZnZjYXZlbHVoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyMzA0MTksImV4cCI6MjA5MTgwNjQxOX0.RpsniUKYkfDCJmgKSL6jme3viKoIWxbvojReuEZuDgk';
// ══════════════════════════════════════

if(!SB_URL || SB_URL==='YOUR_URL' || !SB_KEY || SB_KEY==='YOUR_KEY'){
  document.getElementById('app').innerHTML='<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px"><div style="background:#fff;padding:30px;border-radius:16px;max-width:400px;text-align:center;box-shadow:0 2px 12px rgba(0,0,0,.08)"><h2 style="color:#c0392b;margin-bottom:12px">⚠️ Supabase 설정 필요</h2><p style="font-size:13px;color:#555;line-height:1.6">HTML 파일을 메모장으로 열고<br><b>SB_URL</b>과 <b>SB_KEY</b>를 입력하세요.</p></div></div>';
  throw new Error('Supabase 설정 필요');
}
var sb = window.supabase.createClient(SB_URL, SB_KEY);

var PARISHES=['4111','4112','4113','4121','4122','4131','4132','4133','4134','4141','4151'];
var COLS=[
  {k:'attendance',l:'출석',p:20,t:'c',s:['인원','합산']},{k:'bible_read',l:'성경읽기',p:1,t:'n',s:['장','합산']},
  {k:'winter_bible',l:'겨울방학읽기',p:1,t:'n',s:['장','합산']},{k:'bible_marathon',l:'통독수련회',p:1189,t:'c',s:['인원','합산']},
  {k:'bible_write',l:'성경쓰기',p:5,t:'n',s:['쪽','합산']},{k:'bible_typing',l:'성경타이핑',p:2,t:'n',s:['쪽','합산']},
  {k:'memorize',l:'암송',p:3,t:'c',s:['인원','합산']},{k:'evangelism',l:'전도',p:50,t:'c',s:['인원','합산']},
  {k:'district_service',l:'구역봉사',p:100,t:'c',s:['인원','합산']},{k:'sunday_service',l:'봉사팀봉사',p:30,t:'c',s:['개수','합산']},
  {k:'nurture',l:'양육',p:10,t:'c',s:['인원','합산']},{k:'martyr_guide',l:'양화진안내',p:20,t:'c',s:['인원','합산']},
  {k:'environment',l:'환경보호',p:100,t:'c',s:['여부','합산']},{k:'meeting_place',l:'구역모임장소',p:100,t:'c',s:['여부','합산']}
];
var sundays=[];
(function(){var now=new Date();for(var i=-12;i<=4;i++){var d=new Date(now);var day=d.getDay();d.setDate(d.getDate()-day+(day===0?0:7)+i*7);d.setHours(0,0,0,0);var m=d.getMonth()+1,dt=d.getDate();sundays.push({k:d.getFullYear()+'-'+String(m).padStart(2,'0')+'-'+String(dt).padStart(2,'0'),l:m+'/'+dt,ts:d.getTime()});}})();

var D={week:'',data:null,loading:false,ready:false};
D.week=(function(){var c=sundays[0],now=Date.now();for(var i=0;i<sundays.length;i++){if(Math.abs(sundays[i].ts-now)<Math.abs(c.ts-now))c=sundays[i];}return c.k;})();
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2500);}

async function loadData(){D.loading=true;render();var r=await sb.from('reports').select('*').eq('report_date',D.week);D.data=r.data||[];D.loading=false;var ag=calc();var done=ag?PARISHES.filter(function(p){return ag[p].total>0;}).length:0;toast(done>0?done+'개 구역 입력 완료':'입력된 구역 없음');render();}
function calc(){if(!D.data)return null;var r={};PARISHES.forEach(function(p){r[p]={n:0,leader:'',lAtt:0,lBible:0,items:{},total:0,att:[]};COLS.forEach(function(c){r[p].items[c.k]={cnt:0,sum:0,sc:0};});});D.data.forEach(function(row){var pid=String(row.parish_id);if(!r[pid])return;r[pid].n++;if(row.role==='구역장'){r[pid].leader=row.member_name;if(row.attendance==='O')r[pid].lAtt=1;r[pid].lBible=parseInt(row.bible_read)||0;}if(row.attendance==='O')r[pid].att.push(row.member_name);COLS.forEach(function(c){var v=row[c.k];if(c.t==='c'){if(v==='O'){r[pid].items[c.k].cnt++;r[pid].items[c.k].sc+=c.p;}}else{var n=parseInt(v)||0;if(n>0){r[pid].items[c.k].cnt++;r[pid].items[c.k].sum+=n;r[pid].items[c.k].sc+=n*c.p;}}});});PARISHES.forEach(function(p){COLS.forEach(function(c){r[p].total+=r[p].items[c.k].sc;});});return r;}
function setW(k){D.week=k;D.data=null;render();}
function render(){var sy=window.scrollY;_render();requestAnimationFrame(function(){window.scrollTo(0,sy);});}

function renderLogin(){
  document.getElementById('app').innerHTML='<div class="login"><div class="login-c">'
    +'<div style="font-size:42px;text-align:center">⛪</div>'
    +'<h1>구역보고서</h1>'
    +'<div class="err" id="login-err"></div>'
    +'<label for="login-id">아이디</label>'
    +'<input id="login-id" type="text" placeholder="교구번호 또는 admin" autocomplete="username" autocapitalize="off" spellcheck="false">'
    +'<label for="login-pw">비밀번호</label>'
    +'<input id="login-pw" type="password" placeholder="비밀번호" autocomplete="current-password">'
    +'<button class="btn" id="login-btn" onclick="doLogin()">로그인</button>'
    +'</div></div>';
  var idEl=document.getElementById('login-id');if(idEl)idEl.focus();
  var pwEl=document.getElementById('login-pw');if(pwEl)pwEl.addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});
  if(idEl)idEl.addEventListener('keydown',function(e){if(e.key==='Enter')document.getElementById('login-pw').focus();});
}
async function doLogin(){
  var idEl=document.getElementById('login-id'),pwEl=document.getElementById('login-pw');
  var errEl=document.getElementById('login-err'),btn=document.getElementById('login-btn');
  var uid=idEl?idEl.value.trim():'',pw=pwEl?pwEl.value:'';
  if(!uid||!pw){if(errEl){errEl.textContent='아이디와 비밀번호를 입력하세요';errEl.style.display='block';}return;}
  if(btn){btn.disabled=true;btn.textContent='로그인 중...';}
  if(errEl)errEl.style.display='none';
  var email=(uid==='admin')?'admin@c41.app':'u'+uid+'@c41.app';
  var r=await sb.auth.signInWithPassword({email:email,password:pw});
  if(r.error){if(errEl){errEl.textContent=r.error.message;errEl.style.display='block';}if(btn){btn.disabled=false;btn.textContent='로그인';}return;}
  await onAuth(r.data.user);
}
async function onAuth(user){
  var meta=user.user_metadata||{};
  if(meta.role==='parish'){window.location.href='church-checklist.html';return;}
  D.ready=true;render();
}
async function doLogout(){await sb.auth.signOut();D.ready=false;render();}

function _render(){
  if(!D.ready){renderLogin();return;}
  var wk;for(var i=0;i<sundays.length;i++){if(sundays[i].k===D.week){wk=sundays[i];break;}}
  var ag=calc();
  var h='<div class="hd"><div><h1>41교구 구역보고서</h1><p>'+(wk?wk.l:'')+' 주일</p></div><button onclick="doLogout()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#908caa" stroke-width="1.5"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg></button></div>';
  h+='<div class="tabs">';for(var i=0;i<sundays.length;i++){var s=sundays[i];h+='<button class="'+(s.k===D.week?'on':'')+'" onclick="setW(\''+s.k+'\')">'+s.l+'</button>';}h+='</div>';
  h+='<div class="ctrl"><button class="c1" onclick="loadData()" '+(D.loading?'disabled':'')+'>'+( D.loading?'조회 중...':'📊 DATA 조회')+'</button>';if(D.data&&ag){var pDone=PARISHES.filter(function(p){return ag[p].total>0;}).length;h+='<span class="info">총 '+PARISHES.length+'개 구역 : '+pDone+'개 구역 입력 완료</span>';}h+='</div>';
  if(!D.data){h+='<div class="msg">주차 선택 → DATA 조회</div>';document.getElementById('app').innerHTML=h;requestAnimationFrame(function(){var a=document.querySelector('.tabs .on');if(a)a.scrollIntoView({inline:'center',behavior:'auto'});});return;}
  if(!ag||!D.data.length){h+='<div class="msg">데이터 없음</div>';document.getElementById('app').innerHTML=h;return;}
  var tAtt=D.data.filter(function(r){return r.attendance==='O';}).length,tScore=PARISHES.reduce(function(s,p){return s+ag[p].total;},0);
  h+='<div class="cards"><div class="cd"><div class="v">'+PARISHES.filter(function(p){return ag[p].n>0;}).length+'</div><div class="l">교구</div></div><div class="cd"><div class="v">'+tAtt+'</div><div class="l">총출석</div></div><div class="cd"><div class="v">'+tScore.toLocaleString()+'</div><div class="l">총점</div></div></div>';
  h+='<div class="tw"><table class="rt"><tr><th rowspan="2" style="position:sticky;left:0;z-index:3;min-width:50px">구역</th><th rowspan="2">구역장</th><th class="y" colspan="2">구역장출석</th>';COLS.forEach(function(c){h+='<th colspan="2">'+c.l+'<br>('+c.p+')</th>';});h+='<th rowspan="2" style="background:#0d1117">합계</th><th rowspan="2">참석자</th></tr><tr><th class="sub">출석</th><th class="sub">성경</th>';COLS.forEach(function(c){h+='<th class="sub">'+c.s[0]+'</th><th class="sub">'+c.s[1]+'</th>';});h+='</tr>';
  PARISHES.forEach(function(p){var d=ag[p];h+='<tr><td class="nm">'+p+'</td><td style="font-size:9px">'+d.leader+'</td><td>'+(d.lAtt?'<span class="v">1</span>':'<span class="z">0</span>')+'</td><td>'+(d.lBible>0?'<span class="v">'+d.lBible+'</span>':'<span class="z">0</span>')+'</td>';COLS.forEach(function(c){var it=d.items[c.k];if(c.t==='n'){h+='<td>'+(it.sum>0?'<span class="v">'+it.sum+'</span>':'<span class="z">0</span>')+'</td><td>'+(it.sc>0?'<span class="v">'+it.sc.toLocaleString()+'</span>':'<span class="z">0</span>')+'</td>';}else{h+='<td>'+(it.cnt>0?'<span class="v">'+it.cnt+'</span>':'<span class="z">0</span>')+'</td><td>'+(it.sc>0?'<span class="v">'+it.sc.toLocaleString()+'</span>':'<span class="z">0</span>')+'</td>';}});h+='<td class="sc">'+(d.total>0?d.total.toLocaleString():'')+'</td><td class="att">'+d.att.join(', ')+'</td></tr>';});
  h+='<tr class="tr"><td class="nm">합계</td><td>'+PARISHES.filter(function(p){return ag[p].leader;}).length+'</td><td>'+PARISHES.reduce(function(s,p){return s+ag[p].lAtt;},0)+'</td><td>'+PARISHES.reduce(function(s,p){return s+ag[p].lBible;},0)+'</td>';COLS.forEach(function(c){var tc=0,ts=0,tsc=0;PARISHES.forEach(function(p){var it=ag[p].items[c.k];tc+=it.cnt;ts+=it.sum;tsc+=it.sc;});h+=c.t==='n'?'<td>'+ts+'</td><td>'+tsc.toLocaleString()+'</td>':'<td>'+tc+'</td><td>'+tsc.toLocaleString()+'</td>';});h+='<td class="sc">'+tScore.toLocaleString()+'</td><td></td></tr></table></div>';
  var sorted=PARISHES.slice().sort(function(a,b){return ag[b].total-ag[a].total;}),mx=sorted.length?ag[sorted[0]].total:1,cl=['#1a237e','#283593','#303f9f','#3949ab','#3f51b5','#5c6bc0','#7986cb','#9fa8da','#c5cae9','#d1c4e9','#e8eaf6'];
  h+='<div class="bs"><div class="bs-t">총점 순위</div>';sorted.forEach(function(p,i){var sc=ag[p].total,pct=mx>0?Math.round(sc/mx*100):0;h+='<div class="br"><span class="br-l">'+p+'</span><div class="br-bg"><div class="br-f" style="width:'+pct+'%;background:'+cl[i]+'"></div></div><span class="br-v">'+sc.toLocaleString()+'</span></div>';});h+='</div>';
  document.getElementById('app').innerHTML=h;requestAnimationFrame(function(){var a=document.querySelector('.tabs .on');if(a)a.scrollIntoView({inline:'center',behavior:'auto'});});
}

(async function(){
  document.getElementById('app').innerHTML='<div style="min-height:100vh;display:flex;align-items:center;justify-content:center"><div style="font-size:12px;color:#908caa">불러오는 중...</div></div>';
  var r=await sb.auth.getSession();
  if(r.data.session)await onAuth(r.data.session.user);
  else renderLogin();
})();
</script>
